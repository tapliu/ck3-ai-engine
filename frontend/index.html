<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>浪子江湖-侠行四海</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: system-ui, sans-serif; background: #1a1a2e; color: #eee; padding: 2rem; max-width: 1200px; margin: 0 auto; }
h1 { text-align:center; color:#e94560; margin-bottom:1rem; }
.header { display:flex; align-items:center; justify-content:space-between; margin-bottom:1.5rem; flex-wrap:wrap; gap:0.5rem; }
.round { font-size:1.2rem; color:#a0a0c0; background:#16213e; padding:0.4rem 1rem; border-radius:6px; }
.controls { display:flex; gap:0.5rem; }
button { padding:0.5rem 1.5rem; background:#e94560; color:#fff; border:none; border-radius:4px; cursor:pointer; font-size:1rem; }
button:hover { background:#c73650; }
button:disabled { opacity:0.5; cursor:not-allowed; }

/* 玩家横幅 */
.player-banner { background:linear-gradient(135deg,#16213e,#1a1a3e); border:2px solid #e94560; border-radius:12px; padding:1.5rem; margin-bottom:1.5rem; display:grid; grid-template-columns:auto 1fr auto; gap:1.5rem; align-items:start; box-shadow:0 0 16px rgba(233,69,96,0.2); }
.player-avatar { width:80px; height:80px; border-radius:50%; background:#e94560; display:flex; align-items:center; justify-content:center; font-size:2.5rem; font-weight:bold; color:#fff; }
.player-info h2 { color:#e94560; margin-bottom:0.3rem; }
.player-info .sub { color:#a0a0c0; font-size:0.9rem; }
.player-info .stats { display:flex; gap:1.5rem; margin-top:0.5rem; flex-wrap:wrap; }
.player-info .stats span { font-size:0.9rem; }
.player-info .stats .val { color:#eee; font-weight:bold; }
.player-info .stats .lbl { color:#888; }
.player-info .rels { margin-top:0.5rem; display:flex; gap:0.3rem; flex-wrap:wrap; }
.related-chars { display:flex; flex-direction:column; gap:0.5rem; }
.related-char-card { background:#0f0f23; border:1px solid #555; border-radius:8px; padding:0.5rem; text-align:center; min-width:110px; }
.related-char-card .rc-name { color:#e94560; font-weight:bold; font-size:0.85rem; }
.related-char-card .rc-tag { display:inline-block; font-size:0.7rem; background:#e94560; padding:0.05rem 0.4rem; border-radius:4px; color:#fff; margin-left:0.2rem; }
.related-char-card .rc-stats { font-size:0.75rem; color:#aaa; margin-top:0.2rem; }
.related-char-card .rc-city { font-size:0.7rem; color:#888; }
.badge { display:inline-block; background:#0f3460; border-radius:4px; padding:0.15rem 0.5rem; font-size:0.75rem; }

/* 宝物 */
.treasure { display:inline-block; background:#3a1a2e; border:1px solid #e94560; border-radius:4px; padding:0.15rem 0.5rem; font-size:0.75rem; margin-right:0.2rem; margin-bottom:0.2rem; color:#f0a0b0; }

.layout { display:flex; gap:1.5rem; }
.grid { flex:1; display:grid; grid-template-columns:repeat(auto-fill,minmax(290px,1fr)); gap:1rem; align-content:start; }
.npc-section { grid-column:1 / -1; }
.card { background:#16213e; border-radius:8px; padding:1rem; border:1px solid #0f3460; }
.card .name { font-size:1.1rem; font-weight:bold; color:#e94560; }
.tag { font-size:0.8rem; color:#888; margin-left:0.3rem; }
.main-title { font-size:0.75rem; color:#ffd700; margin-left:0.3rem; background:#2a2a0e; padding:0 0.3rem; border-radius:3px; }
.card .city { font-size:0.8rem; color:#a0a0c0; display:inline-block; margin-left:0.3rem; }
.capital-badge { background:#ffd700; color:#1a1a2e; font-size:0.7rem; font-weight:bold; padding:0.1rem 0.4rem; border-radius:3px; margin-left:0.3rem; }
.center-badge { background:#e040fb; color:#fff; font-size:0.7rem; padding:0.1rem 0.3rem; border-radius:3px; margin-left:0.2rem; }
.move-card { background:#16213e; border:2px solid #4ecdc4; border-radius:8px; padding:1rem; cursor:pointer; text-align:center; transition:all 0.2s; }
.move-card:hover { border-color:#e94560; transform:translateY(-4px); }
.move-card .dest { font-size:1.1rem; font-weight:bold; color:#4ecdc4; }
.move-card .rinfo { font-size:0.8rem; color:#888; margin-top:0.2rem; }
.card .stats { display:grid; grid-template-columns:1fr 1fr 1fr; gap:0.2rem 0.8rem; margin:0.4rem 0; }
.card .stat { font-size:0.85rem; }
.card .stat span { color:#a0a0c0; }
.card .val { color:#eee; font-weight:bold; }
.card .stat-age { background:#0f3460; border-radius:4px; padding:0.1rem 0.3rem; }
.card .stat-age .val { color:#ffd700; }
.card .stat-score { background:#3a1a2e; border-radius:4px; padding:0.1rem 0.3rem; }
.card .stat-score .val { color:#e94560; }
.card .alive { color:#4caf50; font-weight:bold; }
.card .dead { color:#f44336; font-weight:bold; }
.card .desc { color:#666; font-size:0.8rem; margin:0.3rem 0; }

.highlight-age { color:#ffd700; font-weight:bold; }
.highlight-score { color:#e94560; font-weight:bold; }

.sidebar { width:340px; flex-shrink:0; }
.events { background:#16213e; border-radius:8px; padding:1rem; max-height:600px; overflow-y:auto; position:sticky; top:1rem; }
.events h2 { margin-bottom:0.5rem; color:#e94560; font-size:1rem; }
.event-item { padding:0.35rem 0; border-bottom:1px solid #0f3460; font-size:0.85rem; }
.event-round { color:#e94560; font-weight:bold; margin-right:0.4rem; font-size:0.75rem; }
.event-treasure { color:#f0a0b0; }
.event-wuxia { color:#80c0e0; }
.event-combat { color:#ff6b35; }
.event-cooperation { color:#4ecdc4; }
.event-task_success { color:#4caf50; }
.event-task_fail { color:#f44336; }
.event-decay { color:#ff9800; }
.event-tournament { color:#e040fb; }
.event-death { color:#000; font-weight:bold; background:#f44336; padding:0.1rem 0.3rem; border-radius:3px; }
.xia-yi { color:#ffd700; font-size:0.85rem; }
.tournament-group { background:#16213e; border:1px solid #533483; border-radius:8px; padding:0.8rem; margin-bottom:0.8rem; }
.tournament-group h3 { color:#e040fb; font-size:0.95rem; margin-bottom:0.3rem; }
.tournament-match { font-size:0.8rem; padding:0.15rem 0; color:#a0a0c0; }
.tournament-standings { font-size:0.8rem; color:#888; margin-top:0.2rem; }
.tournament-ko { background:#1a1a3e; border:1px solid #e040fb; border-radius:8px; padding:0.8rem; margin-bottom:0.5rem; }
.tournament-ko h3 { color:#e040fb; font-size:0.95rem; }
.tournament-champion { text-align:center; padding:1rem; background:linear-gradient(135deg,#3a1a2e,#533483); border:2px solid #ffd700; border-radius:12px; margin-top:1rem; }
.tournament-champion .name { font-size:1.3rem; color:#ffd700; font-weight:bold; }
.decay-card { background:#16213e; border:2px solid #ff9800; border-radius:8px; padding:1rem; cursor:pointer; text-align:center; transition:all 0.2s; }
.decay-card:hover { border-color:#e94560; transform:translateY(-4px); }
.decay-card .label { font-size:1.1rem; font-weight:bold; color:#ff9800; }
.decay-card .value { font-size:1.5rem; color:#eee; margin:0.3rem 0; }
.decay-card .note { font-size:0.8rem; color:#888; }
.select-img { width:100%; max-height:240px; object-fit:cover; border-radius:6px; margin-bottom:0.5rem; }
.char-portrait { width:80px; height:80px; border-radius:50%; object-fit:cover; border:2px solid #e94560; cursor:pointer; }
.char-portrait-sm { width:50px; height:50px; border-radius:50%; object-fit:cover; border:2px solid #0f3460; cursor:pointer; }
.char-portrait-sm:hover { border-color:#e94560; }
.fullbody-img { max-width:100%; max-height:70vh; display:block; margin:0 auto; border-radius:8px; }

.task-card { background:#16213e; border:2px solid #0f3460; border-radius:8px; padding:1rem; margin-bottom:1rem; }
.task-card .task-name { font-size:1.1rem; font-weight:bold; color:#e94560; }
.task-card .task-desc { font-size:0.85rem; color:#a0a0c0; margin:0.3rem 0; }
.task-card .task-chance { font-size:0.85rem; color:#888; margin:0.3rem 0; }
.task-btns { display:flex; gap:0.5rem; margin-top:0.5rem; }
.task-btns button { flex:1; padding:0.4rem 0; font-size:0.85rem; }
.task-btn-scheme { background:#533483; }
.task-btn-scheme:hover { background:#6b4099; }
.task-btn-focus { background:#2d6a4f; }
.task-btn-focus:hover { background:#40916c; }
.task-card-deadly { border-color:#f44336; background:linear-gradient(135deg,#2e1a1a,#16213e); box-shadow:0 0 12px rgba(244,67,54,0.3); }
.task-deadly-icon { color:#f44336; font-weight:bold; margin-left:0.3rem; }
.gameover-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.92); justify-content:center; align-items:flex-start; z-index:999; overflow-y:auto; padding:2rem; }
.citymap-wrapper { display:flex; flex-direction:column; gap:1rem; }
.citymap-section { background:#0f3460; border-radius:6px; padding:0.8rem; }
.citymap-section>h3 { color:#e94560; font-size:0.95rem; margin-bottom:0.5rem; text-align:center; border-bottom:1px solid #1a1a3e; padding-bottom:0.3rem; }
.citymap-zhongyuan-grid { display:grid; grid-template-columns:1fr 1fr; gap:0.5rem; }
.citymap-grid { display:grid; grid-template-columns:1fr 1fr; gap:1rem; }
.citymap-region { background:#0f3460; border-radius:6px; padding:0.8rem; }
.citymap-region h3 { color:#e94560; font-size:0.95rem; margin-bottom:0.5rem; text-align:center; border-bottom:1px solid #1a1a3e; padding-bottom:0.3rem; }
.citymap-city { display:flex; align-items:center; gap:0.4rem; padding:0.3rem 0.5rem; border-bottom:1px solid #1a1a3e; font-size:0.85rem; }
.citymap-city:last-child { border-bottom:none; }
.citymap-city .cname { color:#eee; font-weight:bold; }
.citymap-city .cpop { color:#888; font-size:0.75rem; margin-left:auto; }
.citymap-city .cconn { color:#4ecdc4; font-size:0.75rem; margin-left:0.5rem; }
.gameover-overlay.active { display:flex; }
.gameover-box { max-width:720px; width:100%; margin:0 auto; }
.gameover-box h1 { font-size:2.5rem; color:#e94560; margin-bottom:0.3rem; text-align:center; }
.gameover-subtitle { text-align:center; color:#a0a0c0; font-size:1rem; margin-bottom:2rem; }
.go-section { background:#16213e; border:1px solid #0f3460; border-radius:8px; padding:1.2rem; margin-bottom:1rem; }
.go-section h2 { color:#e94560; font-size:1.1rem; margin-bottom:0.8rem; border-bottom:1px solid #0f3460; padding-bottom:0.4rem; }
.go-titles { display:flex; flex-wrap:wrap; gap:0.4rem; }
.go-title-badge { background:linear-gradient(135deg,#3a1a2e,#533483); border:1px solid #e040fb; border-radius:12px; padding:0.25rem 0.7rem; font-size:0.85rem; color:#e040fb; }
.go-stat-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:0.5rem; }
.go-stat-box { text-align:center; background:#0f3460; padding:0.5rem; border-radius:6px; }
.go-stat-box .label { font-size:0.75rem; color:#888; }
.go-stat-box .change { font-weight:bold; font-size:1rem; }
.go-stat-box .change.up { color:#4caf50; }
.go-stat-box .change.down { color:#f44336; }
.go-friend { display:inline-flex; align-items:center; gap:0.3rem; background:#0f3460; border-radius:4px; padding:0.2rem 0.5rem; margin:0.15rem; font-size:0.85rem; }
.go-friend .rel { color:#4ecdc4; font-weight:bold; }
.go-enemy { display:inline-flex; align-items:center; gap:0.3rem; background:#2e1a1a; border-radius:4px; padding:0.2rem 0.5rem; margin:0.15rem; font-size:0.85rem; }
.go-enemy .rel { color:#f44336; font-weight:bold; }
.go-timeline { max-height:300px; overflow-y:auto; font-size:0.8rem; }
.go-tl-item { padding:0.25rem 0; border-bottom:1px solid #0f3460; color:#a0a0c0; }
.go-tl-item .round { color:#e94560; font-weight:bold; margin-right:0.5rem; }
.go-tl-item .tl-title { color:#e040fb; margin-right:0.3rem; }
.go-tl-item .tl-treasure { color:#f0a0b0; }
.go-tl-item .tl-combat { color:#ff6b35; }
.go-tl-item .tl-cooperation { color:#4ecdc4; }
.go-tl-item .tl-task_success { color:#4caf50; }
.go-tl-item .tl-task_fail { color:#f44336; }
.go-tl-item .tl-death { color:#000; background:#f44336; padding:0.1rem 0.3rem; border-radius:3px; font-weight:bold; }
.go-tl-item .tl-marry { color:#ff69b4; }
.go-tl-item .tl-apprentice { color:#80c0e0; }
.go-tl-item .tl-sworn { color:#ffd700; }
.go-tl-item .tl-decay { color:#ff9800; }
.go-tl-item .tl-title { color:#e040fb; }
.go-xia-yi { text-align:center; font-size:1.3rem; color:#ffd700; font-weight:bold; padding:1rem; border:2px solid #ffd700; border-radius:8px; margin-bottom:1rem; }
.task-result { position:fixed; top:1rem; left:50%; transform:translateX(-50%); padding:0.8rem 1.5rem; border-radius:8px; z-index:200; font-size:0.95rem; text-align:center; display:none; max-width:500px; }
.task-result-ok { background:#1b4332; border:1px solid #4caf50; color:#a5d6a7; }
.task-result-fail { background:#3e1a1a; border:1px solid #f44336; color:#ef9a9a; }

.treasure-detail { max-width:400px; }
.treasure-detail .td-name { font-size:1.3rem; color:#e94560; font-weight:bold; }
.treasure-detail .td-type { font-size:0.85rem; color:#888; margin-bottom:0.5rem; }
.treasure-detail .td-desc { font-size:0.9rem; color:#a0a0c0; margin-bottom:0.8rem; }
.treasure-detail .td-bonus { display:grid; grid-template-columns:1fr 1fr; gap:0.3rem; }
.treasure-detail .td-bonus .tb-item { background:#0f3460; padding:0.3rem 0.6rem; border-radius:4px; font-size:0.85rem; text-align:center; }
.treasure-detail .td-bonus .tb-item .tb-val { font-weight:bold; color:#e94560; }

/* turn battle */
.tbat-container { display:flex; align-items:center; justify-content:space-between; gap:1rem; margin-bottom:0.8rem; }
.tbat-side { flex:1; background:#16213e; border-radius:8px; padding:0.8rem; border:1px solid #0f3460; text-align:center; }
.tbat-win { border-color:#4caf50; background:#1a3a1a; }
.tbat-lose { border-color:#f44336; background:#3a1a1a; }
.tbat-name { font-size:1rem; font-weight:bold; color:#eee; margin-bottom:0.2rem; }
.tbat-sub { min-height:1.2rem; }
.tbat-status { display:inline-block; font-size:0.7rem; color:#ff9800; background:#2a2a0e; padding:0 0.3rem; border-radius:3px; margin:0.1rem; }
.tbat-stat { font-size:0.8rem; color:#888; margin:0.2rem 0; }
.tbat-hp-bar { position:relative; height:20px; background:#333; border-radius:10px; overflow:hidden; margin:0.3rem 0; }
.tbat-hp-fill { height:100%; border-radius:10px; transition:width 0.3s; }
.tbat-hp-text { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-size:0.75rem; font-weight:bold; color:#fff; text-shadow:0 0 3px #000; }
.tbat-vs { font-size:1.2rem; font-weight:bold; color:#e94560; }
.tbat-round { text-align:center; color:#888; font-size:0.85rem; margin-bottom:0.5rem; }
.tbat-log { background:#0a0a1a; border-radius:8px; padding:0.5rem; max-height:200px; overflow-y:auto; margin-bottom:0.8rem; font-size:0.85rem; }
.tbat-log-line { padding:0.15rem 0; color:#a0a0c0; border-bottom:1px solid #111; }
.tbat-actions { display:flex; gap:0.5rem; justify-content:center; flex-wrap:wrap; }
.tbat-btn { padding:0.5rem 1rem; border-radius:6px; border:1px solid #0f3460; background:#16213e; color:#eee; cursor:pointer; font-size:0.9rem; transition:all 0.2s; }
.tbat-btn:hover { background:#0f3460; }
.tbat-btn-attack:hover { border-color:#f44336; color:#f44336; }
.tbat-btn-defend:hover { border-color:#4caf50; color:#4caf50; }
.tbat-btn-skill:hover { border-color:#e040fb; color:#e040fb; }
.tbat-btn-retreat:hover { border-color:#ff9800; color:#ff9800; }
.tbat-tactic-grid { display:grid; grid-template-columns:1fr 1fr; gap:0.5rem; margin-bottom:0.5rem; }
.tbat-tactic-card { background:#16213e; border:1px solid #0f3460; border-radius:8px; padding:0.8rem; cursor:pointer; text-align:center; transition:all 0.2s; }
.tbat-tactic-card:hover { border-color:#e94560; background:#1a1a3e; }
.tbat-tactic-name { font-size:1rem; font-weight:bold; color:#e94560; }
.tbat-tactic-desc { font-size:0.8rem; color:#888; margin-top:0.2rem; }
.tbat-tactic-tag { display:inline-block; font-size:0.7rem; color:#e94560; background:#3a1a2e; padding:0 0.3rem; border-radius:3px; margin:0.1rem; }

/* overlay */
.overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); justify-content:center; align-items:center; z-index:10000; }
.overlay.active { display:flex; }
.modal { background:#1a1a2e; border:2px solid #e94560; border-radius:12px; padding:2rem; max-width:640px; width:90%; max-height:80vh; overflow-y:auto; }
.modal h2 { color:#e94560; margin-bottom:1rem; text-align:center; }
.modal .intro { text-align:center; margin-bottom:1.5rem; color:#a0a0c0; }
.pick-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:1rem; }
.pick-card { background:#16213e; border:2px solid #0f3460; border-radius:8px; padding:1rem; cursor:pointer; text-align:center; transition:all 0.2s; }
.pick-card:hover { border-color:#e94560; transform:translateY(-4px); }
.pick-card .name { font-size:1.1rem; font-weight:bold; color:#e94560; }
.pick-card .stat { font-size:0.85rem; color:#a0a0c0; margin:0.2rem 0; }
.pick-card .desc { font-size:0.8rem; color:#666; margin-top:0.5rem; }

/* 武将编辑 */
.char-edit-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:0.8rem; max-height:60vh; overflow-y:auto; padding:0.5rem; }
.char-edit-card { background:#16213e; border:1px solid #0f3460; border-radius:8px; padding:0.8rem; }
.char-edit-card .ce-name { font-size:1rem; font-weight:bold; color:#e94560; margin-bottom:0.3rem; }
.char-edit-card .ce-field { display:flex; align-items:center; gap:0.4rem; margin:0.2rem 0; font-size:0.85rem; }
.char-edit-card .ce-field label { color:#aaa; min-width:3em; }
.char-edit-card .ce-field input { width:60px; background:#0f0f23; border:1px solid #555; color:#eee; padding:0.2rem 0.4rem; border-radius:3px; font-size:0.85rem; text-align:center; }
.char-edit-card .ce-field input.ce-wide { width:180px; text-align:left; }
.char-edit-card .ce-desc { margin-top:0.3rem; }
.char-edit-card .ce-desc textarea { width:100%; background:#0f0f23; border:1px solid #555; color:#ccc; padding:0.3rem; border-radius:3px; font-size:0.8rem; resize:vertical; min-height:40px; }
.char-edit-card .ce-idx { color:#555; font-size:0.75rem; }

/* 开始界面 */
.start-overlay { position:fixed; inset:0; z-index:9999; display:none; align-items:center; justify-content:center; background:#0a0a1a; }
.start-overlay.active { display:flex; }
#startCanvas, #charMenuCanvas, #charCreateCanvas, #customCharEditCanvas { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; pointer-events:none; }
.start-content { position:relative; z-index:1; text-align:center; }
.start-title-top { font-size:1.3rem; color:#e94560; letter-spacing:0.6em; margin-bottom:0.3rem; text-shadow:0 0 20px rgba(233,69,96,0.5); }
.start-title { font-size:4.5rem; font-weight:bold; background:linear-gradient(180deg,#ffd700,#e94560); -webkit-background-clip:text; -webkit-text-fill-color:transparent; text-shadow:none; letter-spacing:0.3em; margin-bottom:0.3rem; }
.start-subtitle { font-size:1.1rem; color:#a0a0c0; letter-spacing:0.4em; margin-bottom:3rem; }
.start-buttons { display:flex; flex-direction:column; gap:1rem; align-items:center; }
.start-buttons button { width:260px; padding:0.9rem 0; background:rgba(22,33,62,0.85); border:2px solid #e94560; border-radius:6px; cursor:pointer; transition:all 0.3s; position:relative; overflow:hidden; }
.start-buttons button:hover { background:rgba(233,69,96,0.25); border-color:#ffd700; transform:translateY(-2px); box-shadow:0 0 20px rgba(233,69,96,0.3); }
.start-buttons button .btn-zh { font-size:1.1rem; color:#eee; letter-spacing:0.3em; }

@media(max-width:768px) { .layout { flex-direction:column; } .sidebar { width:100%; } .pick-grid { grid-template-columns:1fr; } .player-banner { grid-template-columns:1fr; text-align:center; } .player-avatar { margin:0 auto; } .related-chars { flex-direction:row; flex-wrap:wrap; justify-content:center; } .start-title { font-size:2.8rem; } .cc-content { flex-direction:column; align-items:center; } .cc-image-section { max-width:400px; } .cc-form-section { max-width:400px; } }
/* 自建武将 */
.cc-content { display:flex; gap:2rem; justify-content:center; align-items:flex-start; max-width:900px; margin:0 auto; padding:1rem; }
.cc-image-section { flex-shrink:0; max-width:480px; }
.cc-form-section { flex-shrink:0; max-width:380px; text-align:left; }
.img-select-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:0.4rem; margin-bottom:0.8rem; }
.img-select-item { width:100%; aspect-ratio:1/1; border:2px solid #555; border-radius:6px; cursor:pointer; object-fit:cover; transition:all 0.2s; }
.img-select-item:hover { border-color:#e94560; transform:scale(1.05); }
.img-select-item.selected { border-color:#ffd700; box-shadow:0 0 8px rgba(255,215,0,0.5); }
.cc-preview { display:flex; gap:1rem; align-items:center; justify-content:center; margin-bottom:0.8rem; }
.cc-preview-portrait { width:100px; height:100px; border-radius:50%; object-fit:cover; border:2px solid #e94560; }
.cc-preview-body { max-height:160px; border-radius:6px; border:1px solid #555; }
.cc-form-row { display:flex; gap:0.5rem; margin:0.3rem 0; align-items:center; }
.cc-form-row label { color:#aaa; min-width:3em; font-size:0.9rem; }
.cc-form-row input,.cc-form-row select { background:#0f0f23; border:1px solid #555; color:#eee; padding:0.3rem 0.5rem; border-radius:3px; font-size:0.9rem; }
.cc-form-row input { width:70px; text-align:center; }
.cc-form-row input.cc-wide { width:180px; text-align:left; }
.cc-desc textarea { width:100%; background:#0f0f23; border:1px solid #555; color:#ccc; padding:0.3rem; border-radius:3px; font-size:0.85rem; resize:vertical; min-height:50px; }
.cc-actions { display:flex; gap:0.8rem; justify-content:center; margin-top:1rem; }
.custom-char-list { max-width:700px; margin:0 auto; text-align:left; max-height:60vh; overflow-y:auto; padding:0.5rem; }
.custom-char-item { display:flex; align-items:center; gap:1rem; background:#16213e; border:1px solid #0f3460; border-radius:8px; padding:0.8rem; margin-bottom:0.6rem; }
.custom-char-item .cci-img { width:50px; height:50px; border-radius:50%; object-fit:cover; border:2px solid #e94560; flex-shrink:0; }
.custom-char-item .cci-info { flex:1; min-width:0; }
.custom-char-item .cci-name { font-size:1rem; font-weight:bold; color:#e94560; }
.custom-char-item .cci-stats { font-size:0.8rem; color:#aaa; }
.custom-char-item .cci-actions { display:flex; gap:0.4rem; flex-shrink:0; }
.custom-char-item .cci-actions button { padding:0.3rem 0.7rem; font-size:0.8rem; }
</style>
</head>

<script>
async function fetchWorld() {
  try {
    const r = await fetch('/api/world');
    window._lastData = await r.json();
    render(window._lastData);
  } catch(e) { console.error(e); }
}

let _lastTournamentChampion = null;

async function tick() {
  const btn = document.getElementById('tickBtn');
  btn.disabled = true;
  try {
    await fetch('/tick', {method:'POST'});
    await fetchWorld();
    await fetchEvents();
    // 自动弹出防守战
    const d = window._lastData;
    if (d.active_battle && d.active_battle.active) {
      openTurnBattle(d.active_battle);
      return;
    }
    // 自动弹出武道会结果
    if (d.tournament && d.tournament.active && d.tournament.champion && d.tournament.champion !== _lastTournamentChampion) {
      _lastTournamentChampion = d.tournament.champion;
      showTournament();
    }
    // 自动弹出华山论剑结果
    if (d.huashan_result && d.huashan_result.champion) {
      showHuashanResult();
    }
    const hasMove = await checkPendingMove();
    if (!hasMove) {
      const hasEvent = await checkPendingEvents();
      if (!hasEvent) {
        const hasDecay = await checkDecay();
        if (!hasDecay) {}
      }
    }
    // 任务独立检测，不受移动/事件/衰减阻塞
    if (!document.querySelector('.overlay.active')) {
      await checkPendingTasks();
    }
  } catch(e) { console.error(e); }
  btn.disabled = false;
}

async function fetchEvents() {
  try {
    const r = await fetch('/api/events');
    const data = await r.json();
    const log = document.getElementById('eventLog');
    const TYPE_CLASS = {'treasure':'event-treasure','wuxia':'event-wuxia','combat':'event-combat','cooperation':'event-cooperation','task_success':'event-task_success','task_fail':'event-task_fail','decay':'event-decay','tournament':'event-tournament','death':'event-death','move':'event-wuxia','battle':'event-combat','conquest':'event-treasure','battle_log':'event-wuxia'};
    data.forEach(e => {
      if (e.id && (e.type === 'battle' || e.type === 'conquest')) {
        _eventStore[e.id] = e;
      }
    });
    log.innerHTML = data.map(e => {
      const cls = TYPE_CLASS[e.type]||'';
      const clickable = e.type === 'battle' || e.type === 'conquest';
      const onclick = clickable ? ` onclick="showBattleReport('${e.id||''}')" style="cursor:pointer;"` : '';
      return `<div class="event-item ${cls}"${onclick}><span class="event-round">[第${e.round||'?'}回]</span>${clickable ? '<span style="color:#ff6b35;font-weight:bold;">⚔ </span>' : ''}${e.desc}</div>`;
    }).join('') + log.innerHTML;
  } catch(e) { console.error(e); }
}

function renderSettlement(s) {
  if (!s) return '';
  const statLabel = {init_l:'机敏',init_w:'武力',init_p:'智谋',init_i:'魅力'};
  const stats = ['l','w','p','i'];
  const TYPE_CLS = {treasure:'tl-treasure',combat:'tl-combat',cooperation:'tl-cooperation',task_success:'tl-task_success',task_fail:'tl-task_fail',death:'tl-death',marry:'tl-marry',apprentice:'tl-apprentice',sworn:'tl-sworn',decay:'tl-decay',title:'tl-title',move:'tl-title'};
  return `
    <h1>${s.alive ? '归隐江湖' : '逝'}</h1>
    <div class="go-subtitle">历经 ${s.rounds} 回合 · ${s.alive ? '功成身退' : '战死江湖'}</div>
    <div class="go-xia-yi">侠义值: ${s.xia_yi}</div>
    <div class="go-section">
      <h2>称号</h2>
      <div class="go-titles">${(s.titles||[]).length ? s.titles.map(t=>`<span class="go-title-badge">${t}</span>`).join('') : '<span style="color:#888;font-size:0.85rem;">无</span>'}</div>
    </div>
    <div class="go-section">
      <h2>属性变化</h2>
      <div class="go-stat-grid">${stats.map(k => {
        const init = s['init_'+k], fin = s['final_'+k];
        const diff = fin - init;
        const cls = diff > 0 ? 'up' : diff < 0 ? 'down' : '';
        return `<div class="go-stat-box"><div class="label">${statLabel['init_'+k]}</div><div class="change ${cls}">${init} → ${fin}${diff ? ` (${diff>0?'+':''}${diff})` : ''}</div></div>`;
      }).join('')}</div>
    </div>
    <div class="go-section">
      <h2>江湖关系</h2>
      <div style="margin-bottom:0.5rem;">
        <span style="color:#888;font-size:0.85rem;">好友 (${s.friends.length})：</span>
        ${s.friends.map(f => `<span class="go-friend">${f.name} <span class="rel">+${f.rel}</span></span>`).join('')||'<span style="color:#888;font-size:0.8rem;">无</span>'}
      </div>
      <div>
        <span style="color:#888;font-size:0.85rem;">宿敌 (${s.enemies.length})：</span>
        ${s.enemies.map(e => `<span class="go-enemy">${e.name} <span class="rel">${e.rel}</span></span>`).join('')||'<span style="color:#888;font-size:0.8rem;">无</span>'}
      </div>
      <div style="margin-top:0.5rem;color:#a0a0c0;font-size:0.85rem;">
        ${s.spouse ? `配偶: ${s.spouse}` : ''}${s.spouse&&s.master?' · ':''}${s.master ? `师父: ${s.master}` : ''}${(s.spouse||s.master)&&s.sworn_brothers.length?' · ':''}${s.sworn_brothers.length ? `义${s.sworn_brothers[0]?.[0]==='男'?'兄弟':'姐妹'}: ${s.sworn_brothers.join('、')}` : ''}
      </div>
    </div>
    <div class="go-section">
      <h2>宝物</h2>
      <div>${(s.treasures||[]).length ? s.treasures.map(t => `<span class="treasure">${t.name}</span>`).join('') : '<span style="color:#888;font-size:0.85rem;">未获得任何宝物</span>'}</div>
    </div>
    <div class="go-section">
      <h2>江湖历程</h2>
      <div class="go-timeline">${(s.timeline||[]).map(h => {

let _startLandscapeInited = false;
function drawStartLandscape(canvasId) {
  const canvas = document.getElementById(canvasId || 'startCanvas');
  if (!canvas) return;
  if (!_startLandscapeInited) {
    _startLandscapeInited = true;
    window.addEventListener('resize', () => {
      document.querySelectorAll('.start-overlay.active canvas').forEach(c => {
        const cvs = c;
        cvs.width = window.innerWidth;
        cvs.height = window.innerHeight;
        redrawCanvas(cvs);
      });
    });
  }
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  redrawCanvas(canvas);
}

function redrawCanvas(canvas) {
  const ctx = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;
    ctx.clearRect(0, 0, w, h);

    // 天空渐变
    const sky = ctx.createLinearGradient(0, 0, 0, h);
    sky.addColorStop(0, '#0a0a1a');
    sky.addColorStop(0.3, '#1a1a3e');
    sky.addColorStop(0.6, '#16213e');
    sky.addColorStop(1, '#0f3460');
    ctx.fillStyle = sky;
    ctx.fillRect(0, 0, w, h);

    // 月亮
    const moonX = w * 0.78, moonY = h * 0.12;
    const moonGrad = ctx.createRadialGradient(moonX, moonY, 0, moonX, moonY, 50);
    moonGrad.addColorStop(0, 'rgba(255,215,0,0.3)');
    moonGrad.addColorStop(0.5, 'rgba(255,215,0,0.1)');
    moonGrad.addColorStop(1, 'rgba(255,215,0,0)');
    ctx.fillStyle = moonGrad;
    ctx.fillRect(moonX - 60, moonY - 60, 120, 120);
    ctx.beginPath();
    ctx.arc(moonX, moonY, 30, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,215,0,0.15)';
    ctx.fill();
    ctx.beginPath();
    ctx.arc(moonX, moonY, 22, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(230,200,150,0.25)';
    ctx.fill();

    // 远山层1（最远，最淡）
    ctx.fillStyle = 'rgba(30,40,70,0.3)';
    ctx.beginPath();
    ctx.moveTo(0, h * 0.55);
    for (let x = 0; x <= w; x += 8) {
      const y = h * 0.55 + Math.sin(x * 0.003 + 1) * 40 + Math.sin(x * 0.007) * 25 + Math.sin(x * 0.015 + 2) * 12;
      ctx.lineTo(x, y);
    }
    ctx.lineTo(w, h);
    ctx.lineTo(0, h);
    ctx.fill();

    // 远山层2
    ctx.fillStyle = 'rgba(25,35,65,0.5)';
    ctx.beginPath();
    ctx.moveTo(0, h * 0.60);
    for (let x = 0; x <= w; x += 8) {
      const y = h * 0.60 + Math.sin(x * 0.004 + 0.5) * 35 + Math.sin(x * 0.009 + 1.5) * 20 + Math.sin(x * 0.018 + 3) * 10;
      ctx.lineTo(x, y);
    }
    ctx.lineTo(w, h);
    ctx.lineTo(0, h);
    ctx.fill();

    // 远山层3（最近，最深）
    ctx.fillStyle = 'rgba(20,30,55,0.7)';
    ctx.beginPath();
    ctx.moveTo(0, h * 0.64);
    for (let x = 0; x <= w; x += 8) {
      const y = h * 0.64 + Math.sin(x * 0.005 + 2) * 30 + Math.sin(x * 0.011 + 0.8) * 18 + Math.sin(x * 0.022 + 1) * 8;
      ctx.lineTo(x, y);
    }
    ctx.lineTo(w, h);
    ctx.lineTo(0, h);
    ctx.fill();

    // 水面
    const waterGrad = ctx.createLinearGradient(0, h * 0.66, 0, h);
    waterGrad.addColorStop(0, 'rgba(15,20,50,0.6)');
    waterGrad.addColorStop(0.5, 'rgba(10,15,40,0.8)');
    waterGrad.addColorStop(1, 'rgba(5,10,30,1)');
    ctx.fillStyle = waterGrad;
    ctx.beginPath();
    ctx.moveTo(0, h * 0.66);
    for (let x = 0; x <= w; x += 6) {
      const y = h * 0.66 + Math.sin(x * 0.008 + 1) * 6 + Math.sin(x * 0.02 + 3) * 3;
      ctx.lineTo(x, y);
    }
    ctx.lineTo(w, h);
    ctx.lineTo(0, h);
    ctx.fill();

    // 水面波光
    ctx.strokeStyle = 'rgba(200,200,255,0.06)';
    ctx.lineWidth = 1;
    for (let i = 0; i < 20; i++) {
      const bx = Math.random() * w;
      const by = h * 0.7 + Math.random() * h * 0.25;
      ctx.beginPath();
      ctx.moveTo(bx, by);
      ctx.lineTo(bx + 30 + Math.random() * 40, by);
      ctx.stroke();
    }

    // 飞鸟
    ctx.strokeStyle = 'rgba(200,200,255,0.12)';
    ctx.lineWidth = 1.5;
    for (let i = 0; i < 8; i++) {
      const bx = w * 0.1 + Math.random() * w * 0.6;
      const by = h * 0.15 + Math.random() * h * 0.2;
      const bw = 12 + Math.random() * 8;
      ctx.beginPath();
      ctx.moveTo(bx - bw, by + 3);
      ctx.quadraticCurveTo(bx - bw * 0.3, by - 6, bx, by + 2);
      ctx.quadraticCurveTo(bx + bw * 0.3, by - 5, bx + bw, by + 3);
      ctx.stroke();
    }

    // 松树枝（近景点缀）
    ctx.fillStyle = 'rgba(15,25,45,0.9)';
    for (let i = 0; i < 4; i++) {
      const px = w * 0.05 + i * w * 0.25 + Math.random() * 40;
      const py = h * 0.62 + Math.random() * 20;
      // 树干
      ctx.fillStyle = 'rgba(30,20,10,0.8)';
      ctx.fillRect(px - 2, py, 4, 30 + Math.random() * 20);
      // 树冠
      const ch = 40 + Math.random() * 30;
      ctx.fillStyle = 'rgba(15,30,50,0.8)';
      ctx.beginPath();
      ctx.moveTo(px, py - ch);
      ctx.lineTo(px - 18 - Math.random() * 10, py + 5);
      ctx.lineTo(px + 18 + Math.random() * 10, py + 5);
      ctx.fill();
    }
}

    p: parseInt(document.getElementById(`ce_p_${c.id}`)?.value) || c.p,

async function saveCustomChar() {
  const name = document.getElementById('ccName').value.trim();
  if (!name) { alert('请输入角色名称'); return; }
  const data = {
    name: name,
    gender: document.getElementById('ccGender').value,
    l: parseInt(document.getElementById('ccL').value) || 50,
    w: parseInt(document.getElementById('ccW').value) || 50,
    i: parseInt(document.getElementById('ccI').value) || 50,
    p: parseInt(document.getElementById('ccP').value) || 50,
    age: parseInt(document.getElementById('ccAge').value) || 20,
    desc: document.getElementById('ccDesc').value || '',
    imageIdx: _ccSelectedIdx || 1,
  };
  try {
    var r;
    if (_ccEditId !== null) {
      data.id = _ccEditId;
      r = await fetch('/api/characters/custom/update', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data)});
    } else {
      r = await fetch('/api/characters/custom/create', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data)});
    }
    const result = await r.json();
    if (result.ok) {
      alert(_ccEditId !== null ? '保存成功！' : '创建成功！');
      closeCharCreator();
    } else {
      alert('操作失败：' + (result.error || '未知错误'));

  } catch(e) { console.error(e); alert('网络错误'); }
}

// 移动系统
var _rushMode = false;

function renderMoveGrid(rush) {
  const pm = window._lastData.pending_move;
  if (!pm) return;
  const info = window._cities;
  const grid = document.getElementById('moveGrid');
  _rushMode = rush;
  document.getElementById('moveBackBtn').style.display = rush ? 'inline-block' : 'none';
  const cities = rush ? (pm.two_step_cities || []) : pm.routes;
  const action = rush ? 'rush' : 'move';
  const label = rush ? '日夜兼程目的地' : '相邻城市';
  document.getElementById('moveIntro').textContent = `当前位置: ${pm.city} · ${label}`;
  if (cities.length === 0) {
    grid.innerHTML = '<div style="color:#888;text-align:center;padding:1rem;">无可选目的地</div>';
    return;
  }
  grid.innerHTML = cities.map(d => {
    const ci = info && info[d] || {};
    const badges = [];
    if (ci.capital) badges.push('帝都');
    if (ci.regional_center) badges.push('要冲');
    const bHtml = badges.length ? ' <span style="color:#ffd700;">['+badges.join('+')+']</span>' : '';
    const region = ci.region ? ' · '+ci.region : '';
    const extra = rush ? ' <span style="color:#e94560;font-size:0.7rem;">[2程]</span>' : '';
    return `<div class="move-card" onclick="executeMove('${d}','${action}')">
      <div class="dest">${d}${bHtml}${extra}</div>
      <div class="rinfo">${region}</div>
    </div>`;
  }).join('');
}

function toggleRushMode() {
  renderMoveGrid(!_rushMode);
}

async function checkPendingMove() {
  if (!window._lastData || !window._lastData.pending_move) return false;
  const pm = window._lastData.pending_move;
  _rushMode = false;
  // 日夜兼程按钮状态
  const rushBtn = document.getElementById('moveRushBtn');
  const rushLbl = document.getElementById('rushLabel');
  if (pm.rush_available) {
    rushBtn.disabled = false;
    rushLbl.textContent = `(冷却3回合) · ${(pm.two_step_cities||[]).length}城可达`;
    rushBtn.style.opacity = '1';
  } else {
    rushBtn.disabled = true;
    rushLbl.textContent = `(冷却剩${pm.rush_cooldown_remaining}回合)`;
    rushBtn.style.opacity = '0.5';
  }
  renderMoveGrid(false);
  document.getElementById('moveOverlay').classList.add('active');
  return true;
}

async function executeMove(dest, action) {
  try {

    await fetch('/api/move', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)});
    document.getElementById('moveOverlay').classList.remove('active');
    await fetchWorld();

// 任务系统
async function checkPendingTasks() {
  try {
    const r = await fetch('/api/tasks/pending');
    const data = await r.json();
    if (data.tasks && data.tasks.length > 0) showTasks(data.tasks);
  } catch(e) { console.error(e); }
}

function showTasks(tasks) {
  const overlay = document.getElementById('taskOverlay');
  document.getElementById('tickBtn').disabled = true;
  const list = document.getElementById('taskList');
  const pData = window._lastData && window._lastData.player;
  const curRound = (window._lastData && window._lastData.round) || 0;
  const schemeCd = (pData && pData.scheme_cooldown_round) || 0;
  const focusCd = (pData && pData.focus_cooldown_round) || 0;
  const schemeOnCd = schemeCd > curRound;
  const focusOnCd = focusCd > curRound;
  list.innerHTML = tasks.map(t => {
    const TYPE_LABELS = {non_char:'非人物类', char:'人物类', coop:'合作任务', deadly:'极难任务'};
    const typeLabel = TYPE_LABELS[t.type]||t.type;
    const chanceLabel = t.scheme_bonus > 0 ? `基础 ${t.base_chance}% · 谋略 ${t.chance_with_scheme}% · 全力 ${t.focus_chance}%` : `基础 ${t.base_chance}% · 全力 ${t.focus_chance}%`;
    const targetHtml = t.target ? `<div style="color:#4ecdc4;font-size:0.85rem;margin:0.2rem 0;">合作对象: ${t.target}</div>` : '';
    const deadlyIcon = t.deadly ? `<span class="task-deadly-icon">☠ 极难</span>` : '';
    const deadlyCls = t.deadly ? ' task-card-deadly' : '';
    let cdHtml = '';
    if (schemeOnCd) cdHtml += `<div style="color:#e94560;font-size:0.8rem;margin:0.1rem 0;">谋略冷却剩余 ${schemeCd - curRound} 回合</div>`;
    if (focusOnCd) cdHtml += `<div style="color:#e94560;font-size:0.8rem;margin:0.1rem 0;">全力施展冷却剩余 ${focusCd - curRound} 回合</div>`;
    const schemeDisabled = schemeOnCd ? 'disabled' : '';
    const focusDisabled = focusOnCd ? 'disabled' : '';
    return `<div class="task-card${deadlyCls}" id="taskCard${t.id}">
      <div class="task-name">${t.name} ${deadlyIcon}<span style="font-size:0.8rem;color:#888;">[${typeLabel}]</span></div>
      <div class="task-desc">${t.desc}</div>
      ${targetHtml}
      <div class="task-chance">难度 ${t.difficulty} · ${chanceLabel}</div>
      ${cdHtml}
      <div class="task-btns">
        <button id="taskBtn${t.id}_0" onclick="executeTask(${t.id},'normal')">尝试 (${t.base_chance}%)</button>
        <button class="task-btn-scheme" ${schemeDisabled} id="taskBtn${t.id}_1" onclick="executeTask(${t.id},'scheme')">用谋略 (${t.chance_with_scheme}%)</button>
        <button class="task-btn-focus" ${focusDisabled} id="taskBtn${t.id}_2" onclick="executeTask(${t.id},'focus')">全力施展 (${t.focus_chance}%)</button>
      </div>
    </div>`;
  }).join('');
  overlay.classList.add('active');
}

async function executeTask(taskId, mode) {
  document.querySelectorAll('#taskCard'+taskId+' button').forEach(b => b.disabled = true);
  try {
    const r = await fetch('/api/tasks/execute', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({task_id:taskId, mode:mode})});
    const result = await r.json();
    document.getElementById('taskOverlay').classList.remove('active');
    document.getElementById('tickBtn').disabled = false;
    if (result.type === 'turn_battle') {
      openTurnBattle(result.battle);
      return;
    }
    const banner = document.getElementById('taskResultBanner');
    banner.textContent = result.desc;
    banner.className = 'task-result ' + (result.success ? 'task-result-ok' : 'task-result-fail');
    banner.style.display = 'block';
    setTimeout(() => { banner.style.display = 'none'; }, 4000);
    await fetchWorld();
    await fetchEvents();
  } catch(e) { console.error(e); }
}

function skipTasks() {
  document.getElementById('taskOverlay').classList.remove('active');
  document.getElementById('tickBtn').disabled = false;
}

function renderTurnBattle(bt) {
  const el = document.getElementById('turnBattleContent');

  // 战术选择阶段
  if (bt.tactics_open) {
    const tlist = bt.tactic_list || [];
    const TACTIC_DESC = {
      '正面强攻': '攻击↑30% 防御↓30%',
      '稳步推进': '攻击/防御不变',
      '迂回包抄': '攻击↑20% 防御↓20%',

          </div>

    return;
  }

  const pStatusStr = bt.p_status && Object.keys(bt.p_status).length ?
    Object.entries(bt.p_status).map(([k,v]) => {
      const label = k === 'silence' ? '沉默' : '禁锢';
      return `<span class="tbat-status">${label}(${v}回合)</span>`;
    }).join('') : '';
  const eStatusStr = bt.e_status && Object.keys(bt.e_status).length ?
    Object.entries(bt.e_status).map(([k,v]) => {
      const label = k === 'silence' ? '沉默' : '禁锢';
      return `<span class="tbat-status">${label}(${v}回合)</span>`;
    }).join('') : '';

  const pSkill = bt.p_skill ? `· 技「${bt.p_skill.name}」` : '';

  const pTacticStr = bt.p_tactic ? `<span class="tbat-tactic-tag">${bt.p_tactic}</span>` : '';
  const eTacticStr = bt.e_tactic ? `<span class="tbat-tactic-tag">${bt.e_tactic}</span>` : '';

  const title = bt.is_defense ? '⚔ 防守战' : '⚔ 攻城战';

        <div class="tbat-sub">${pStatusStr} ${pTacticStr}</div>

      </div>
      <div class="tbat-vs">VS</div>
      <div class="tbat-side ${bt.active ? '' : (bt.winner === bt.e_name ? 'tbat-win' : 'tbat-lose')}">
        <div class="tbat-name">${bt.e_name} ${eSkill}</div>
        <div class="tbat-sub">${eStatusStr} ${eTacticStr}</div>
        <div class="tbat-stat">攻击 ${bt.e_attack} · 防御 ${bt.e_defense}</div>
        <div class="tbat-hp-bar"><div class="tbat-hp-fill" style="width:${(bt.e_hp/bt.e_max_hp*100)}%;background:#f44336;"></div><span class="tbat-hp-text">${bt.e_hp}/${bt.e_max_hp}</span></div>
      </div>
    </div>
    <div class="tbat-round">第 ${bt.round} 回合</div>
    <div class="tbat-log">${(bt.logs||[]).map(l => '<div class="tbat-log-line">'+l+'</div>').join('')}</div>
    ${(function(){
      if (bt.active) {
        return '<div class="tbat-actions">' +
          '<button class="tbat-btn tbat-btn-attack" onclick="tbatAction(\'attack\')">⚔ 攻击</button>' +
          '<button class="tbat-btn tbat-btn-defend" onclick="tbatAction(\'defend\')">🛡 防御</button>' +
          '<button class="tbat-btn tbat-btn-skill" onclick="tbatAction(\'skill\')">✨ 技能</button>' +

          '</div>';
      } else if (bt.is_defense) {
        var color = bt.winner === bt.p_name ? '#4caf50' : '#f44336';
        var text = bt.winner === bt.p_name ? '🎉 防守成功！' : (bt.winner === bt.e_name ? '💀 城破' : '⚔ 平局');

          '<button onclick="closeTurnBattle()">关闭</button></div>';
      } else if (bt.garrison_pending) {
        var pTroops = bt.p_troops || 0;
        var defaultG = Math.floor(pTroops * 0.3);
        return '<div style="text-align:center;margin-top:1rem;">' +
          '<div style="font-size:1.2rem;font-weight:bold;color:#4caf50;margin-bottom:0.5rem;">🎉 胜利！选择留守兵力</div>' +

// 自动托管
let autoTimer = null;
let autoTicked = false;

function toggleAuto() {
  const btn = document.getElementById('autoBtn');
  if (autoTimer) {
    autoTimer = null;
    autoTicked = false;
    btn.textContent = '托管';
    btn.style.background = '#2d6a4f';
  } else {
    btn.textContent = '托管中';
    btn.style.background = '#e94560';
    autoTimer = 1;
    autoTicked = false;
    doAutoTick();
  }
}

async function doAutoTick() {
  if (!autoTimer) return;
  // 按优先级自动处理弹窗：移动 > 事件 > 不进则退 > 任务
  if (document.getElementById('moveOverlay').classList.contains('active')) {
    // 优先移动，其次日夜兼程，最后停留
    const mb = document.querySelector('#moveGrid .move-card:first-child');
    if (mb) { mb.click(); }
    else if (!document.getElementById('moveRushBtn').disabled) { document.getElementById('moveRushBtn').click(); }
    else { document.getElementById('moveStayBtn').click(); }
    setTimeout(doAutoTick, 300);
    return;
  }
  if (document.getElementById('eventOverlay').classList.contains('active')) {
    await autoChooseEvent();
    setTimeout(doAutoTick, 300);
    return;
  }
  if (document.getElementById('decayOverlay').classList.contains('active')) {
    await autoChooseDecay();
    setTimeout(doAutoTick, 300);
    return;
  }
  if (document.getElementById('taskOverlay').classList.contains('active')) {
    await autoExecuteBestTask();
    setTimeout(doAutoTick, 300);
    return;
  }
  if (document.getElementById('gameoverOverlay').classList.contains('active')) { toggleAuto(); return; }
  const tickBtn = document.getElementById('tickBtn');
  if (tickBtn.disabled) { setTimeout(doAutoTick, 500); return; }
  if (autoTicked) { toggleAuto(); return; }
  autoTicked = true;
  await tick();
  setTimeout(doAutoTick, 300);
}

async function autoChooseEvent() {
  try {
    const r = await fetch('/api/events/pending');
    const data = await r.json();
    if (data.events && data.events[0] && data.events[0].candidates && data.events[0].candidates[0]) {
      await decideEvent(data.events[0].event, data.events[0].candidates[0].name);
    }
  } catch(e) { console.error(e); }
}

async function autoChooseDecay() {
  try {
    const r = await fetch('/api/decay/pending');
    const data = await r.json();
    if (data.stats && data.stats.length > 0) {
      const best = data.stats.reduce((a,b) => a.value > b.value ? a : b);
      await executeDecay(best.field);
    }
  } catch(e) { console.error(e); }
}

async function autoExecuteBestTask() {
  try {
    const r = await fetch('/api/tasks/pending');
    const data = await r.json();
    const tasks = data.tasks || [];
    if (tasks.length === 0) return;
    // 合作任务优先；选择成功率最高的模式
    const chosen = tasks.find(t => t.type === 'coop') || tasks[0];
    const rates = [{mode:'normal',v:chosen.base_chance},{mode:'scheme',v:chosen.chance_with_scheme||0},{mode:'focus',v:chosen.focus_chance}];
    rates.sort((a,b) => b.v - a.v);
    await executeTask(chosen.id, rates[0].mode);
  } catch(e) { console.error(e); }
}

let _mapBgImg = null;
(function preloadMapBg() {
  const img = new Image();
  img.onload = () => { _mapBgImg = img; };
  const t = Date.now();
  img.src = '/api/data/map.webp?t=' + t;
})();

function drawBattleCanvas(data) {
  const canvas = document.getElementById('battleCanvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = 960, H = 600;
  ctx.clearRect(0, 0, W, H);

  // 绘制地图背景
  if (_mapBgImg && _mapBgImg.complete && _mapBgImg.naturalWidth > 0) {
    ctx.drawImage(_mapBgImg, 0, 0, W, H);
    ctx.fillStyle = 'rgba(15,15,35,0.3)';
    ctx.fillRect(0, 0, W, H);
  } else {
    ctx.fillStyle = '#0f0f23';
    ctx.fillRect(0, 0, W, H);
    // 图片未加载时重试
    if (!_mapBgImg || !_mapBgImg.complete) {
      const img = new Image();
      img.onload = () => {
        _mapBgImg = img;
        drawBattleCanvas(data);
      };
      const t = Date.now();
  img.src = '/api/data/map.webp?t=' + t;
    }
  }

  ctx.save();
  ctx.scale(1.2, 1.2);

  // 城池坐标（六边形内环布局，外区置于四角，减少视觉交叉）
  const CITY_POS = {
    '长安': [340, 266], '燕京': [517, 143], '襄阳': [480, 302], '应天府': [539, 211],
    '洛阳': [407, 257], '开封': [493, 250],
    '敦煌': [204, 169], '龟兹': [110, 149], '于阗': [79, 260],
    '凉州': [303, 159], '朔方': [424, 94], '云中': [529, 87],
    '苏州': [479, 389], '杭州': [604, 329], '扬州': [581, 299],
    '登州': [606, 195], '泉州': [602, 427], '宁波': [642, 342],
  };

  // 绘制连接线
  ctx.strokeStyle = 'rgba(200,200,255,0.25)';
  ctx.lineWidth = 1.5;
  if (data.cities) {
    Object.entries(data.cities).forEach(([city, info]) => {
      if (!info.connections) return;
      const [x1, y1] = CITY_POS[city] || [0, 0];
      info.connections.forEach(nei => {
        const [x2, y2] = CITY_POS[nei] || [0, 0];
        if (!x2) return;
        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.lineTo(x2, y2);
        ctx.stroke();
      });
    });
  }

  // 势力颜色映射
  const FACTION_COLORS = {
    player: '#f44336',
    emperor: '#ffd700',
  };
  const NPC_COLORS = [
    '#e91e63', '#9c27b0', '#673ab7', '#3f51b5', '#2196f3',
    '#009688', '#4caf50', '#8bc34a', '#cddc39', '#ff9800',
    '#ff5722', '#795548', '#607d8b', '#00bcd4', '#ff4081',
  ];
  const _npcColorMap = {};
  const playerId = data.player?.id;
  const emperorId = data.characters?.find(c => c.name === '朱棣')?.id;

  // 绘制城池
  Object.entries(CITY_POS).forEach(([city, [x, y]]) => {
    const info = data.cities && data.cities[city];
    const controller = info && info.controller;
    const isControlled = controller !== null && controller !== undefined;
    const controllerChar = isControlled && data.characters ? data.characters.find(c => c.id === controller) : null;

    let fillColor = '#777';
    if (isControlled) {
      if (controller === playerId) {
        fillColor = FACTION_COLORS.player;
      } else if (controller === emperorId) {
        fillColor = FACTION_COLORS.emperor;
      } else {
        if (!_npcColorMap[controller]) {
          _npcColorMap[controller] = NPC_COLORS[Object.keys(_npcColorMap).length % NPC_COLORS.length];
        }
        fillColor = _npcColorMap[controller];
      }
    }

    const radius = city === '应天府' ? 10 : 8;
    ctx.fillStyle = fillColor;
    ctx.beginPath();
    ctx.arc(x, y, radius, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    ctx.fillStyle = '#fff';
    ctx.font = '11px sans-serif';
    ctx.textAlign = 'center';
    const garrison = info && info.garrison !== undefined ? info.garrison : 0;
    ctx.shadowColor = 'rgba(0,0,0,0.8)';
    ctx.shadowBlur = 3;
    ctx.fillText(garrison ? `${city} 兵${garrison}` : city, x, y - radius - 6);
    ctx.shadowBlur = 0;

    if (controllerChar) {
      ctx.fillStyle = '#ffd700';
      ctx.font = '9px sans-serif';
      ctx.shadowColor = 'rgba(0,0,0,0.8)';
      ctx.shadowBlur = 3;
      ctx.fillText(controllerChar.name, x, y + radius + 14);
      ctx.shadowBlur = 0;
    }
  });
  ctx.restore();
}

  }
  html += '</div>';
  document.getElementById('cityPeopleContent').innerHTML = html;
  document.getElementById('cityPeopleOverlay').classList.add('active');
}

let _eventStore = {};
function showBattleReport(eventId) {
  const e = _eventStore[eventId];
  if (!e || !e.battle_result) {
    document.getElementById('battleReportContent').innerHTML = '<div style="color:#888;">暂无详细战报</div>';
    document.getElementById('battleReportOverlay').classList.add('active');
    return;
  }
  const b = e.battle_result;
  let html = `<div style="margin-bottom:1rem;padding:0.8rem;background:#1a1a3e;border-radius:8px;border-left:4px solid ${b.result === 'attacker_win' ? '#4caf50' : b.result === 'draw' ? '#ff9800' : '#f44336'};">
    <div style="font-size:1.1rem;font-weight:bold;margin-bottom:0.3rem;">
      ${b.result === 'attacker_win' ? '🏆 攻击方胜利' : b.result === 'draw' ? '⚖️ 平局' : '🛡️ 防守方胜利'}
    </div>
    <div style="color:#aaa;font-size:0.85rem;">
      ${b.winner ? `胜利: ${b.winner}` : ''} ${b.loser ? ` | 败北: ${b.loser}` : ''}
    </div>
  </div>`;
  html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem;">';
  html += `<div style="background:#16213e;padding:0.6rem;border-radius:6px;">
    <div style="color:#ff6b35;font-weight:bold;">攻击方</div>
    <div style="color:#ccc;">战术: ${b.att_tactic}</div>
    <div style="color:#ccc;">战力: ${b.battles?.[0]?.att_troops_remaining !== undefined ? '—' : ''}</div>
    <div style="color:#f44336;">损失: ${b.att_loss}</div>
  </div>`;
  html += `<div style="background:#16213e;padding:0.6rem;border-radius:6px;">
    <div style="color:#4caf50;font-weight:bold;">防守方</div>
    <div style="color:#ccc;">战术: ${b.def_tactic}</div>
    <div style="color:#ccc;">地形倍率: ${b.tactic_mod}</div>
    <div style="color:#f44336;">损失: ${b.def_loss}</div>
  </div>`;
  html += '</div>';
  if (b.battles && b.battles.length) {
    html += '<h3 style="color:#e94560;margin-bottom:0.5rem;font-size:0.9rem;">回合详情</h3>';
    html += '<div style="max-height:200px;overflow-y:auto;">';
    b.battles.forEach(r => {
      html += `<div style="display:flex;justify-content:space-between;padding:0.3rem 0.5rem;border-bottom:1px solid #1a1a3e;font-size:0.8rem;">
        <span style="color:#888;">第${r.round}回合</span>
        <span style="color:#f44336;">攻击方 -${r.att_loss}</span>
        <span style="color:#4caf50;">防守方 -${r.def_loss}</span>
        <span style="color:#aaa;">剩余: ${r.att_troops_remaining} vs ${r.def_troops_remaining}</span>
      </div>`;
    });
    html += '</div>';
  }
  if (b.logs) {
    html += '<h3 style="color:#e94560;margin:0.5rem 0;font-size:0.9rem;">战报日志</h3>';
    html += '<div style="background:#0f0f23;padding:0.5rem;border-radius:6px;">';
    b.logs.forEach(l => {
      html += `<div style="color:#aaa;font-size:0.8rem;padding:0.15rem 0;">${l}</div>`;
    });
    html += '</div>';
  }
  document.getElementById('battleReportContent').innerHTML = html;
  document.getElementById('battleReportOverlay').classList.add('active');
}

drawStartLandscape();
</script>
</body>
</html>
