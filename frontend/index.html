<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>浪子江湖-侠行四海</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: system-ui, sans-serif; background: #1a1a2e; color: #eee; padding: 2rem; max-width: 1200px; margin: 0 auto; }
h1 { text-align:center; color:#e94560; margin-bottom:1rem; }
.header { display:flex; align-items:center; justify-content:space-between; margin-bottom:1.5rem; flex-wrap:wrap; gap:0.5rem; }
.round { font-size:1.2rem; color:#a0a0c0; background:#16213e; padding:0.4rem 1rem; border-radius:6px; }
.controls { display:flex; gap:0.5rem; }
button { padding:0.5rem 1.5rem; background:#e94560; color:#fff; border:none; border-radius:4px; cursor:pointer; font-size:1rem; }
button:hover { background:#c73650; }
button:disabled { opacity:0.5; cursor:not-allowed; }

/* 玩家横幅 */
.player-banner { background:linear-gradient(135deg,#16213e,#1a1a3e); border:2px solid #e94560; border-radius:12px; padding:1.5rem; margin-bottom:1.5rem; display:grid; grid-template-columns:auto 1fr; gap:1.5rem; align-items:center; box-shadow:0 0 16px rgba(233,69,96,0.2); }
.player-avatar { width:80px; height:80px; border-radius:50%; background:#e94560; display:flex; align-items:center; justify-content:center; font-size:2.5rem; font-weight:bold; color:#fff; }
.player-info h2 { color:#e94560; margin-bottom:0.3rem; }
.player-info .sub { color:#a0a0c0; font-size:0.9rem; }
.player-info .stats { display:flex; gap:1.5rem; margin-top:0.5rem; flex-wrap:wrap; }
.player-info .stats span { font-size:0.9rem; }
.player-info .stats .val { color:#eee; font-weight:bold; }
.player-info .stats .lbl { color:#888; }
.player-info .rels { margin-top:0.5rem; display:flex; gap:0.3rem; flex-wrap:wrap; }
.badge { display:inline-block; background:#0f3460; border-radius:4px; padding:0.15rem 0.5rem; font-size:0.75rem; }

/* 宝物 */
.treasure { display:inline-block; background:#3a1a2e; border:1px solid #e94560; border-radius:4px; padding:0.15rem 0.5rem; font-size:0.75rem; margin-right:0.2rem; margin-bottom:0.2rem; color:#f0a0b0; }

.layout { display:flex; gap:1.5rem; }
.grid { flex:1; display:grid; grid-template-columns:repeat(auto-fill,minmax(290px,1fr)); gap:1rem; align-content:start; }
.npc-section { grid-column:1 / -1; }
.card { background:#16213e; border-radius:8px; padding:1rem; border:1px solid #0f3460; }
.card .name { font-size:1.1rem; font-weight:bold; color:#e94560; }
.card .tag { font-size:0.8rem; color:#888; margin-left:0.3rem; }
.card .city { font-size:0.8rem; color:#a0a0c0; display:inline-block; margin-left:0.3rem; }
.capital-badge { background:#ffd700; color:#1a1a2e; font-size:0.7rem; font-weight:bold; padding:0.1rem 0.4rem; border-radius:3px; margin-left:0.3rem; }
.center-badge { background:#e040fb; color:#fff; font-size:0.7rem; padding:0.1rem 0.3rem; border-radius:3px; margin-left:0.2rem; }
.move-card { background:#16213e; border:2px solid #4ecdc4; border-radius:8px; padding:1rem; cursor:pointer; text-align:center; transition:all 0.2s; }
.move-card:hover { border-color:#e94560; transform:translateY(-4px); }
.move-card .dest { font-size:1.1rem; font-weight:bold; color:#4ecdc4; }
.move-card .rinfo { font-size:0.8rem; color:#888; margin-top:0.2rem; }
.card .stats { display:grid; grid-template-columns:1fr 1fr 1fr; gap:0.2rem 0.8rem; margin:0.4rem 0; }
.card .stat { font-size:0.85rem; }
.card .stat span { color:#a0a0c0; }
.card .val { color:#eee; font-weight:bold; }
.card .alive { color:#4caf50; font-weight:bold; }
.card .dead { color:#f44336; font-weight:bold; }
.card .desc { color:#666; font-size:0.8rem; margin:0.3rem 0; }

.sidebar { width:340px; flex-shrink:0; }
.events { background:#16213e; border-radius:8px; padding:1rem; max-height:600px; overflow-y:auto; position:sticky; top:1rem; }
.events h2 { margin-bottom:0.5rem; color:#e94560; font-size:1rem; }
.event-item { padding:0.35rem 0; border-bottom:1px solid #0f3460; font-size:0.85rem; }
.event-round { color:#e94560; font-weight:bold; margin-right:0.4rem; }
.event-treasure { color:#f0a0b0; }
.event-wuxia { color:#80c0e0; }
.event-combat { color:#ff6b35; }
.event-cooperation { color:#4ecdc4; }
.event-task_success { color:#4caf50; }
.event-task_fail { color:#f44336; }
.event-decay { color:#ff9800; }
.event-tournament { color:#e040fb; }
.event-death { color:#000; font-weight:bold; background:#f44336; padding:0.1rem 0.3rem; border-radius:3px; }
.xia-yi { color:#ffd700; font-size:0.85rem; }
.tournament-group { background:#16213e; border:1px solid #533483; border-radius:8px; padding:0.8rem; margin-bottom:0.8rem; }
.tournament-group h3 { color:#e040fb; font-size:0.95rem; margin-bottom:0.3rem; }
.tournament-match { font-size:0.8rem; padding:0.15rem 0; color:#a0a0c0; }
.tournament-standings { font-size:0.8rem; color:#888; margin-top:0.2rem; }
.tournament-ko { background:#1a1a3e; border:1px solid #e040fb; border-radius:8px; padding:0.8rem; margin-bottom:0.5rem; }
.tournament-ko h3 { color:#e040fb; font-size:0.95rem; }
.tournament-champion { text-align:center; padding:1rem; background:linear-gradient(135deg,#3a1a2e,#533483); border:2px solid #ffd700; border-radius:12px; margin-top:1rem; }
.tournament-champion .name { font-size:1.3rem; color:#ffd700; font-weight:bold; }
.decay-card { background:#16213e; border:2px solid #ff9800; border-radius:8px; padding:1rem; cursor:pointer; text-align:center; transition:all 0.2s; }
.decay-card:hover { border-color:#e94560; transform:translateY(-4px); }
.decay-card .label { font-size:1.1rem; font-weight:bold; color:#ff9800; }
.decay-card .value { font-size:1.5rem; color:#eee; margin:0.3rem 0; }
.decay-card .note { font-size:0.8rem; color:#888; }
.select-img { width:100%; max-height:240px; object-fit:cover; border-radius:6px; margin-bottom:0.5rem; }
.char-portrait { width:80px; height:80px; border-radius:50%; object-fit:cover; border:2px solid #e94560; cursor:pointer; }
.char-portrait-sm { width:50px; height:50px; border-radius:50%; object-fit:cover; border:2px solid #0f3460; cursor:pointer; }
.char-portrait-sm:hover { border-color:#e94560; }
.fullbody-img { max-width:100%; max-height:70vh; display:block; margin:0 auto; border-radius:8px; }

.task-card { background:#16213e; border:2px solid #0f3460; border-radius:8px; padding:1rem; margin-bottom:1rem; }
.task-card .task-name { font-size:1.1rem; font-weight:bold; color:#e94560; }
.task-card .task-desc { font-size:0.85rem; color:#a0a0c0; margin:0.3rem 0; }
.task-card .task-chance { font-size:0.85rem; color:#888; margin:0.3rem 0; }
.task-btns { display:flex; gap:0.5rem; margin-top:0.5rem; }
.task-btns button { flex:1; padding:0.4rem 0; font-size:0.85rem; }
.task-btn-scheme { background:#533483; }
.task-btn-scheme:hover { background:#6b4099; }
.task-btn-focus { background:#2d6a4f; }
.task-btn-focus:hover { background:#40916c; }
.task-card-deadly { border-color:#f44336; background:linear-gradient(135deg,#2e1a1a,#16213e); box-shadow:0 0 12px rgba(244,67,54,0.3); }
.task-deadly-icon { color:#f44336; font-weight:bold; margin-left:0.3rem; }
.gameover-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.92); justify-content:center; align-items:flex-start; z-index:999; overflow-y:auto; padding:2rem; }
.citymap-wrapper { display:flex; flex-direction:column; gap:1rem; }
.citymap-section { background:#0f3460; border-radius:6px; padding:0.8rem; }
.citymap-section>h3 { color:#e94560; font-size:0.95rem; margin-bottom:0.5rem; text-align:center; border-bottom:1px solid #1a1a3e; padding-bottom:0.3rem; }
.citymap-zhongyuan-grid { display:grid; grid-template-columns:1fr 1fr; gap:0.5rem; }
.citymap-grid { display:grid; grid-template-columns:1fr 1fr; gap:1rem; }
.citymap-region { background:#0f3460; border-radius:6px; padding:0.8rem; }
.citymap-region h3 { color:#e94560; font-size:0.95rem; margin-bottom:0.5rem; text-align:center; border-bottom:1px solid #1a1a3e; padding-bottom:0.3rem; }
.citymap-city { display:flex; align-items:center; gap:0.4rem; padding:0.3rem 0.5rem; border-bottom:1px solid #1a1a3e; font-size:0.85rem; }
.citymap-city:last-child { border-bottom:none; }
.citymap-city .cname { color:#eee; font-weight:bold; }
.citymap-city .cpop { color:#888; font-size:0.75rem; margin-left:auto; }
.citymap-city .cconn { color:#4ecdc4; font-size:0.75rem; margin-left:0.5rem; }
.gameover-overlay.active { display:flex; }
.gameover-box { max-width:720px; width:100%; margin:0 auto; }
.gameover-box h1 { font-size:2.5rem; color:#e94560; margin-bottom:0.3rem; text-align:center; }
.gameover-subtitle { text-align:center; color:#a0a0c0; font-size:1rem; margin-bottom:2rem; }
.go-section { background:#16213e; border:1px solid #0f3460; border-radius:8px; padding:1.2rem; margin-bottom:1rem; }
.go-section h2 { color:#e94560; font-size:1.1rem; margin-bottom:0.8rem; border-bottom:1px solid #0f3460; padding-bottom:0.4rem; }
.go-titles { display:flex; flex-wrap:wrap; gap:0.4rem; }
.go-title-badge { background:linear-gradient(135deg,#3a1a2e,#533483); border:1px solid #e040fb; border-radius:12px; padding:0.25rem 0.7rem; font-size:0.85rem; color:#e040fb; }
.go-stat-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:0.5rem; }
.go-stat-box { text-align:center; background:#0f3460; padding:0.5rem; border-radius:6px; }
.go-stat-box .label { font-size:0.75rem; color:#888; }
.go-stat-box .change { font-weight:bold; font-size:1rem; }
.go-stat-box .change.up { color:#4caf50; }
.go-stat-box .change.down { color:#f44336; }
.go-friend { display:inline-flex; align-items:center; gap:0.3rem; background:#0f3460; border-radius:4px; padding:0.2rem 0.5rem; margin:0.15rem; font-size:0.85rem; }
.go-friend .rel { color:#4ecdc4; font-weight:bold; }
.go-enemy { display:inline-flex; align-items:center; gap:0.3rem; background:#2e1a1a; border-radius:4px; padding:0.2rem 0.5rem; margin:0.15rem; font-size:0.85rem; }
.go-enemy .rel { color:#f44336; font-weight:bold; }
.go-timeline { max-height:300px; overflow-y:auto; font-size:0.8rem; }
.go-tl-item { padding:0.25rem 0; border-bottom:1px solid #0f3460; color:#a0a0c0; }
.go-tl-item .round { color:#e94560; font-weight:bold; margin-right:0.5rem; }
.go-tl-item .tl-title { color:#e040fb; margin-right:0.3rem; }
.go-tl-item .tl-treasure { color:#f0a0b0; }
.go-tl-item .tl-combat { color:#ff6b35; }
.go-tl-item .tl-cooperation { color:#4ecdc4; }
.go-tl-item .tl-task_success { color:#4caf50; }
.go-tl-item .tl-task_fail { color:#f44336; }
.go-tl-item .tl-death { color:#000; background:#f44336; padding:0.1rem 0.3rem; border-radius:3px; font-weight:bold; }
.go-tl-item .tl-marry { color:#ff69b4; }
.go-tl-item .tl-apprentice { color:#80c0e0; }
.go-tl-item .tl-sworn { color:#ffd700; }
.go-tl-item .tl-decay { color:#ff9800; }
.go-tl-item .tl-title { color:#e040fb; }
.go-xia-yi { text-align:center; font-size:1.3rem; color:#ffd700; font-weight:bold; padding:1rem; border:2px solid #ffd700; border-radius:8px; margin-bottom:1rem; }
.task-result { position:fixed; top:1rem; left:50%; transform:translateX(-50%); padding:0.8rem 1.5rem; border-radius:8px; z-index:200; font-size:0.95rem; text-align:center; display:none; max-width:500px; }
.task-result-ok { background:#1b4332; border:1px solid #4caf50; color:#a5d6a7; }
.task-result-fail { background:#3e1a1a; border:1px solid #f44336; color:#ef9a9a; }

.treasure-detail { max-width:400px; }
.treasure-detail .td-name { font-size:1.3rem; color:#e94560; font-weight:bold; }
.treasure-detail .td-type { font-size:0.85rem; color:#888; margin-bottom:0.5rem; }
.treasure-detail .td-desc { font-size:0.9rem; color:#a0a0c0; margin-bottom:0.8rem; }
.treasure-detail .td-bonus { display:grid; grid-template-columns:1fr 1fr; gap:0.3rem; }
.treasure-detail .td-bonus .tb-item { background:#0f3460; padding:0.3rem 0.6rem; border-radius:4px; font-size:0.85rem; text-align:center; }
.treasure-detail .td-bonus .tb-item .tb-val { font-weight:bold; color:#e94560; }

/* overlay */
.overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); justify-content:center; align-items:center; z-index:100; }
.overlay.active { display:flex; }
.modal { background:#1a1a2e; border:2px solid #e94560; border-radius:12px; padding:2rem; max-width:640px; width:90%; max-height:80vh; overflow-y:auto; }
.modal h2 { color:#e94560; margin-bottom:1rem; text-align:center; }
.modal .intro { text-align:center; margin-bottom:1.5rem; color:#a0a0c0; }
.pick-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:1rem; }
.pick-card { background:#16213e; border:2px solid #0f3460; border-radius:8px; padding:1rem; cursor:pointer; text-align:center; transition:all 0.2s; }
.pick-card:hover { border-color:#e94560; transform:translateY(-4px); }
.pick-card .name { font-size:1.1rem; font-weight:bold; color:#e94560; }
.pick-card .stat { font-size:0.85rem; color:#a0a0c0; margin:0.2rem 0; }
.pick-card .desc { font-size:0.8rem; color:#666; margin-top:0.5rem; }

@media(max-width:768px) { .layout { flex-direction:column; } .sidebar { width:100%; } .pick-grid { grid-template-columns:1fr; } .player-banner { grid-template-columns:1fr; text-align:center; } .player-avatar { margin:0 auto; } }
</style>
</head>
<body>
<h1>浪子江湖 · 侠行四海</h1>
<div class="header">
  <div class="round" id="roundDisplay">回合: 0</div>
  <div style="font-size:0.85rem;color:#aaa;">
    <span id="aliveCount" style="color:#4caf50;">存活: 0</span>
    &nbsp;
    <span id="deadCount" style="color:#f44336;">阵亡: 0</span>
  </div>
  <div class="controls">
    <button id="tickBtn" onclick="tick()" disabled>推进至下一回合</button>
    <button id="autoBtn" onclick="toggleAuto()" style="background:#2d6a4f;">托管</button>
    <button id="tournamentBtn" onclick="showTournament()" style="display:none;background:#533483;">天下第一武道会</button>
    <button onclick="showCityMap()" style="background:#0f3460;">江山舆图</button>
    <button onclick="fetchWorld()">刷新</button>
  </div>
</div>

<div id="playerBanner" style="display:none;" class="player-banner"></div>

<div class="layout">
  <div style="flex:1;min-width:0;width:100%;">
    <div style="display:flex;align-items:center;gap:0.5rem;margin-bottom:1rem;flex-wrap:wrap;">
      <span style="color:#888;font-size:0.85rem;">排序:</span>
      <select id="sortSelect" onchange="fetchWorld()" style="background:#16213e;color:#eee;border:1px solid #0f3460;border-radius:4px;padding:0.3rem 0.6rem;font-size:0.85rem;">
        <option value="">默认</option>
        <option value="rel">好感</option>
        <option value="l">机敏</option>
        <option value="w">武力</option>
        <option value="i">魅力</option>
        <option value="p">智谋</option>
        <option value="xia_yi">侠义值</option>
      </select>
    </div>
    <div id="world" class="grid"></div>
  </div>
  <div class="sidebar">
    <div class="events" id="events">
      <h2>江湖日志</h2>
      <div id="eventLog"></div>
    </div>
  </div>
</div>

<!-- 选人弹窗 -->
<div class="overlay active" id="selectOverlay">
  <div class="modal">
    <h2>选择你的角色</h2>
    <div class="intro">闯荡江湖，从选择一位侠士开始</div>
    <div class="pick-grid" id="selectGrid"></div>
  </div>
</div>

<!-- 事件弹窗 -->
<div class="overlay" id="eventOverlay">
  <div class="modal">
    <h2 id="eventTitle">事件</h2>
    <div class="intro" id="eventIntro"></div>
    <div class="pick-grid" id="eventGrid"></div>
  </div>
</div>

<!-- 任务弹窗 -->
<div class="overlay" id="taskOverlay">
  <div class="modal">
    <h2>江湖任务</h2>
    <div class="intro">每回合可执行一个任务</div>
    <div id="taskList"></div>
    <div style="text-align:center;margin-top:1rem;"><button onclick="skipTasks()">跳过任务</button></div>
  </div>
</div>

<div id="taskResultBanner" class="task-result"></div>

<!-- 移动弹窗 -->
<div class="overlay" id="moveOverlay">
  <div class="modal" style="max-width:560px;">
    <h2>江湖行路</h2>
    <div class="intro" id="moveIntro">选择行动</div>
<div style="display:flex;gap:0.5rem;margin-bottom:0.8rem;flex-wrap:wrap;">
  <button class="move-action-btn" id="moveStayBtn" onclick="executeMove(null,'stay')" style="background:#2d2d5e;border:1px solid #888;">停留修整</button>
  <button class="move-action-btn" id="moveRushBtn" onclick="toggleRushMode()" style="background:#3d1a2e;border:1px solid #e94560;">日夜兼程 <span id="rushLabel"></span></button>
  <button class="move-action-btn" onclick="renderMoveGrid(false)" id="moveBackBtn" style="background:#333;border:1px solid #666;display:none;">← 返回</button>
</div>
    <div class="intro" style="font-size:0.85rem;color:#aaa;">或选择相邻城市前往：</div>
    <div class="pick-grid" id="moveGrid" style="grid-template-columns:1fr 1fr;"></div>
  </div>
</div>

<!-- 游戏结束 -->
<!-- 江山舆图 -->
<div class="overlay" id="cityMapOverlay">
  <div class="modal" style="max-width:900px;">
    <h2>江山舆图</h2>
    <div id="cityMapContent"></div>
    <div style="text-align:center;margin-top:1rem;"><button onclick="document.getElementById('cityMapOverlay').classList.remove('active')">关闭</button></div>
  </div>
</div>
<!-- 城市人物弹窗 -->
<div class="overlay" id="cityPeopleOverlay">
  <div class="modal" style="max-width:650px;">
    <h2 id="cityPeopleTitle"></h2>
    <div id="cityPeopleContent"></div>
    <div style="text-align:center;margin-top:1rem;"><button onclick="document.getElementById('cityPeopleOverlay').classList.remove('active')">关闭</button></div>
  </div>
</div>

<div class="gameover-overlay" id="gameoverOverlay">
  <div class="gameover-box">
    <div id="settlementContent"></div>
    <div style="text-align:center;margin-top:1.5rem;">
      <button onclick="location.reload()">重新开始</button>
    </div>
  </div>
</div>

<!-- 不进则退弹窗 -->
<div class="overlay" id="decayOverlay">
  <div class="modal" style="max-width:420px;">
    <h2>不进则退</h2>
    <div class="intro">每10回合需选择一项属性降低10%</div>
    <div class="pick-grid" id="decayGrid" style="grid-template-columns:1fr 1fr;"></div>
  </div>
</div>

<!-- 天下第一武道会弹窗 -->
<div class="overlay" id="tournamentOverlay">
  <div class="modal" style="max-width:600px;">
    <h2>🏆 天下第一武道会</h2>
    <div id="tournamentContent"></div>
    <div style="text-align:center;margin-top:1.2rem;"><button onclick="closeTournament()">关闭</button></div>
  </div>
</div>

<!-- 全身像弹窗 -->
<div class="overlay" id="fullbodyOverlay">
  <div class="modal" style="max-width:500px;text-align:center;">
    <img id="fullbodyImg" class="fullbody-img" src="">
    <div style="text-align:center;margin-top:1rem;"><button onclick="document.getElementById('fullbodyOverlay').classList.remove('active')">关闭</button></div>
  </div>
</div>

<!-- 宝物详情弹窗 -->
<div class="overlay" id="treasureOverlay">
  <div class="modal" style="max-width:420px;">
    <div class="treasure-detail" id="treasureDetail"></div>
    <div style="text-align:center;margin-top:1.2rem;"><button onclick="closeTreasure()">关闭</button></div>
  </div>
</div>

<script>
async function fetchWorld() {
  try {
    const r = await fetch('/api/world');
    window._lastData = await r.json();
    render(window._lastData);
  } catch(e) { console.error(e); }
}

async function tick() {
  const btn = document.getElementById('tickBtn');
  btn.disabled = true;
  try {
    await fetch('/tick', {method:'POST'});
    await fetchWorld();
    await fetchEvents();
    await checkTournament();
    const hasMove = await checkPendingMove();
    if (!hasMove) {
      const hasEvent = await checkPendingEvents();
      if (!hasEvent) {
        const hasDecay = await checkDecay();
        if (!hasDecay) await checkPendingTasks();
      }
    }
  } catch(e) { console.error(e); }
  btn.disabled = false;
}

async function fetchEvents() {
  try {
    const r = await fetch('/api/events');

    const log = document.getElementById('eventLog');
    const TYPE_CLASS = {'treasure':'event-treasure','wuxia':'event-wuxia','combat':'event-combat','cooperation':'event-cooperation','task_success':'event-task_success','task_fail':'event-task_fail','decay':'event-decay','tournament':'event-tournament','death':'event-death','move':'event-wuxia'};

function renderSettlement(s) {
  if (!s) return '';
  const statLabel = {init_l:'机敏',init_w:'武力',init_i:'魅力',init_p:'智谋'};
  const stats = ['l','w','i','p'];
  const TYPE_CLS = {treasure:'tl-treasure',combat:'tl-combat',cooperation:'tl-cooperation',task_success:'tl-task_success',task_fail:'tl-task_fail',death:'tl-death',marry:'tl-marry',apprentice:'tl-apprentice',sworn:'tl-sworn',decay:'tl-decay',title:'tl-title',move:'tl-title'};
  return `
    <h1>${s.alive ? '归隐江湖' : '逝'}</h1>
    <div class="go-subtitle">历经 ${s.rounds} 回合 · ${s.alive ? '功成身退' : '战死江湖'}</div>
    <div class="go-xia-yi">侠义值: ${s.xia_yi}</div>
    <div class="go-section">
      <h2>称号</h2>
      <div class="go-titles">${(s.titles||[]).length ? s.titles.map(t=>`<span class="go-title-badge">${t}</span>`).join('') : '<span style="color:#888;font-size:0.85rem;">无</span>'}</div>
    </div>
    <div class="go-section">
      <h2>属性变化</h2>
      <div class="go-stat-grid">${stats.map(k => {
        const init = s['init_'+k], fin = s['final_'+k];
        const diff = fin - init;
        const cls = diff > 0 ? 'up' : diff < 0 ? 'down' : '';
        return `<div class="go-stat-box"><div class="label">${statLabel['init_'+k]}</div><div class="change ${cls}">${init} → ${fin}${diff ? ` (${diff>0?'+':''}${diff})` : ''}</div></div>`;
      }).join('')}</div>
    </div>
    <div class="go-section">
      <h2>江湖关系</h2>
      <div style="margin-bottom:0.5rem;">
        <span style="color:#888;font-size:0.85rem;">好友 (${s.friends.length})：</span>
        ${s.friends.map(f => `<span class="go-friend">${f.name} <span class="rel">+${f.rel}</span></span>`).join('')||'<span style="color:#888;font-size:0.8rem;">无</span>'}
      </div>
      <div>
        <span style="color:#888;font-size:0.85rem;">宿敌 (${s.enemies.length})：</span>
        ${s.enemies.map(e => `<span class="go-enemy">${e.name} <span class="rel">${e.rel}</span></span>`).join('')||'<span style="color:#888;font-size:0.8rem;">无</span>'}
      </div>
      <div style="margin-top:0.5rem;color:#a0a0c0;font-size:0.85rem;">
        ${s.spouse ? `配偶: ${s.spouse}` : ''}${s.spouse&&s.master?' · ':''}${s.master ? `师父: ${s.master}` : ''}${(s.spouse||s.master)&&s.sworn_brothers.length?' · ':''}${s.sworn_brothers.length ? `义${s.sworn_brothers[0]?.[0]==='男'?'兄弟':'姐妹'}: ${s.sworn_brothers.join('、')}` : ''}
      </div>
    </div>
    <div class="go-section">
      <h2>宝物</h2>
      <div>${(s.treasures||[]).length ? s.treasures.map(t => `<span class="treasure">${t.name}</span>`).join('') : '<span style="color:#888;font-size:0.85rem;">未获得任何宝物</span>'}</div>
    </div>
    <div class="go-section">
      <h2>江湖历程</h2>
      <div class="go-timeline">${(s.timeline||[]).map(h => {
        const cls = TYPE_CLS[h.type]||'';
        return `<div class="go-tl-item"><span class="round">[${h.round}]</span><span class="${cls}">${h.desc}</span></div>`;
      }).join('')||'<span style="color:#888;font-size:0.85rem;">无</span>'}</div>
    </div>`;
}

function render(data) {
  window._cities = data.cities || {};
  document.getElementById('roundDisplay').textContent = '回合: ' + (data.round||0);
  if (data.game_over) {
    document.getElementById('gameoverOverlay').classList.add('active');
    document.getElementById('tickBtn').disabled = true;
    if (data.settlement) {
      document.getElementById('settlementContent').innerHTML = renderSettlement(data.settlement);
    }
  }

  // 玩家横幅
  const banner = document.getElementById('playerBanner');
  const p = data.player;
  if (p) {
    banner.style.display = 'grid';
    const STAT_LABELS = {l:'机敏', w:'武力', i:'魅力', p:'智谋'};
    const rels = [];
    if (p.master) rels.push('师:'+p.master);
    if (p.spouse) rels.push('配偶:'+p.spouse);
    (p.sworn_brothers||[]).forEach(b => rels.push('义:'+b));
    banner.innerHTML = `
      <img class="char-portrait" src="${portraitUrl(p.id)}" onclick="showFullBody(${p.id})" title="点击查看全身像">
      <div class="player-info">
        <h2>${p.name}</h2>
        <div class="sub">${p.gender} · ${p.age}岁 · ${p.city||p.region}${p.city&&window._cities&&window._cities[p.city]&&window._cities[p.city].capital?'<span class="capital-badge">帝都</span>':''}${p.city&&window._cities&&window._cities[p.city]&&window._cities[p.city].regional_center?'<span class="center-badge">要冲</span>':''} · 评分 ${p.score}</div>
        <div class="sub" style="margin-top:0.2rem;">${p.desc||''}</div>
        <div class="stats">
          ${Object.entries(STAT_LABELS).map(([k,v]) => {
            const b = p['base_'+k], bonus = p['bonus_'+k]||0;
            const display = bonus ? `${b+bonus} (${b}+${bonus})` : b;
            return `<span><span class="lbl">${v}</span> <span class="val">${display}</span></span>`;
          }).join('')}
        </div>
        <div class="xia-yi">侠义值: ${p.xia_yi||0}${p.title ? ' · 称号: '+p.title : ''}</div>
        <div class="rels">${rels.map(r => `<span class="badge">${r}</span>`).join('')}</div>
        <div class="rels" style="margin-top:0.3rem;">${(p.treasures||[]).map(t => `<span class="treasure" data-treasure='${JSON.stringify(t).replace(/'/g,"\\'")}' onclick="showTreasure(this)">${t.name}</span>`).join('')}</div>
      </div>`;
  } else {
    banner.style.display = 'none';
  }

  // NPC网格
  const el = document.getElementById('world');
  const sortBy = document.getElementById('sortSelect').value;
  const STAT_LABELS = {l:'机敏', w:'武力', i:'魅力', p:'智谋'};
  let chars = (data.characters||[]).filter(c => c.name !== (p&&p.name));
  if (sortBy) {
    const desc = sortBy === 'rel' ? (c) => -(c.rel||0) : (c) => -(c[sortBy]||0);
    chars.sort((a,b) => desc(a) - desc(b));
  }
  const aliveChars = chars.filter(c => c.alive);
  const deadChars = chars.filter(c => !c.alive);
  document.getElementById('aliveCount').textContent = '存活: ' + aliveChars.length;
  document.getElementById('deadCount').textContent = '阵亡: ' + deadChars.length;

  function charCard(c) {
    const rels = [];
    if (c.master) rels.push('师:'+c.master);
    if (c.spouse) rels.push('配偶:'+c.spouse);
    (c.sworn_brothers||[]).forEach(b => rels.push('义:'+b));
    return `
    <div class="card">
      <div style="display:flex;align-items:center;gap:0.5rem;margin-bottom:0.3rem;">
        <img class="char-portrait-sm" src="${portraitUrl(c.id)}" onclick="showFullBody(${c.id})" title="点击查看全身像">
        <div><div class="name">${c.name}<span class="tag">${c.region}</span></div>
        <div class="city">${c.city||''}${c.city&&window._cities&&window._cities[c.city]&&window._cities[c.city].capital?'<span class="capital-badge">帝都</span>':''}${c.city&&window._cities&&window._cities[c.city]&&window._cities[c.city].regional_center?'<span class="center-badge">要冲</span>':''}</div></div>
      </div>
      <div class="desc">${c.desc||''}</div>
      <div class="stats">
        ${Object.entries(STAT_LABELS).map(([k,v]) => {
          const b = c['base_'+k], bonus = c['bonus_'+k]||0;
          const display = bonus ? `${b+bonus} (${b}+${bonus})` : b;
          return `<div class="stat"><span>${v}</span> <span class="val">${display}</span></div>`;
        }).join('')}
        <div class="stat"><span>年龄</span> <span class="val">${c.age}</span></div>
        <div class="stat"><span>评分</span> <span class="val">${c.score}</span></div>
      </div>
      <div style="color:#888;font-size:0.8rem;margin:0.3rem 0;">好感: <span style="color:${(c.rel||0)>=0?'#4caf50':'#f44336'};font-weight:bold;">${(c.rel||0)>=0?'+':''}${c.rel||0}</span></div>
      <div class="xia-yi">侠义值: ${c.xia_yi||0}${c.title ? ' · 称号: '+c.title : ''}</div>
      <div>${rels.map(r => `<span class="badge">${r}</span>`).join('')}</div>
      <div>${(c.treasures||[]).map(t => `<span class="treasure" data-treasure='${JSON.stringify(t).replace(/'/g,"\\'")}' onclick="showTreasure(this)">${t.name}</span>`).join('')}</div>
      <div class="${c.alive?'alive':'dead'}">${c.alive?'存活':'已死亡'}</div>
    </div>`;
  }

  let html = '<div class="npc-section"><h3 style="color:#4caf50;margin-bottom:0.5rem;">江湖群侠 (存活)</h3>';
  html += aliveChars.map(c => charCard(c)).join('');
  html += '</div>';
  if (deadChars.length > 0) {
    html += '<div class="npc-section" style="margin-top:1.5rem;"><h3 style="color:#f44336;margin-bottom:0.5rem;">已故英魂 (阵亡)</h3>';
    html += deadChars.map(c => charCard(c)).join('');
    html += '</div>';
  }
  el.innerHTML = html;
}

// 移动系统
var _rushMode = false;

function renderMoveGrid(rush) {
  const pm = window._lastData.pending_move;
  if (!pm) return;
  const info = window._cities;
  const grid = document.getElementById('moveGrid');
  _rushMode = rush;
  document.getElementById('moveBackBtn').style.display = rush ? 'inline-block' : 'none';
  const cities = rush ? (pm.two_step_cities || []) : pm.routes;
  const action = rush ? 'rush' : 'move';
  const label = rush ? '日夜兼程目的地' : '相邻城市';
  document.getElementById('moveIntro').textContent = `当前位置: ${pm.city} · ${label}`;
  if (cities.length === 0) {
    grid.innerHTML = '<div style="color:#888;text-align:center;padding:1rem;">无可选目的地</div>';
    return;
  }
  grid.innerHTML = cities.map(d => {
    const ci = info && info[d] || {};
    const badges = [];
    if (ci.capital) badges.push('帝都');
    if (ci.regional_center) badges.push('要冲');
    const bHtml = badges.length ? ' <span style="color:#ffd700;">['+badges.join('+')+']</span>' : '';
    const region = ci.region ? ' · '+ci.region : '';
    const extra = rush ? ' <span style="color:#e94560;font-size:0.7rem;">[2程]</span>' : '';
    return `<div class="move-card" onclick="executeMove('${d}','${action}')">
      <div class="dest">${d}${bHtml}${extra}</div>
      <div class="rinfo">${region}</div>
    </div>`;
  }).join('');
}

function toggleRushMode() {
  renderMoveGrid(!_rushMode);
}

async function checkPendingMove() {
  if (!window._lastData || !window._lastData.pending_move) return false;
  const pm = window._lastData.pending_move;
  _rushMode = false;
  // 日夜兼程按钮状态
  const rushBtn = document.getElementById('moveRushBtn');
  const rushLbl = document.getElementById('rushLabel');
  if (pm.rush_available) {
    rushBtn.disabled = false;
    rushLbl.textContent = `(冷却3回合) · ${(pm.two_step_cities||[]).length}城可达`;
    rushBtn.style.opacity = '1';
  } else {
    rushBtn.disabled = true;
    rushLbl.textContent = `(冷却剩${pm.rush_cooldown_remaining}回合)`;
    rushBtn.style.opacity = '0.5';
  }
  renderMoveGrid(false);
  document.getElementById('moveOverlay').classList.add('active');
  return true;
}

function showTasks(tasks) {
  const overlay = document.getElementById('taskOverlay');
  document.getElementById('tickBtn').disabled = true;
  const list = document.getElementById('taskList');
  const pData = window._lastData && window._lastData.player;
  const curRound = (window._lastData && window._lastData.round) || 0;
  const schemeCd = (pData && pData.scheme_cooldown_round) || 0;
  const focusCd = (pData && pData.focus_cooldown_round) || 0;
  const schemeOnCd = schemeCd > curRound;
  const focusOnCd = focusCd > curRound;
  list.innerHTML = tasks.map(t => {
    const TYPE_LABELS = {non_char:'非人物类', char:'人物类', coop:'合作任务', deadly:'极难任务'};
    const typeLabel = TYPE_LABELS[t.type]||t.type;
    const chanceLabel = t.scheme_bonus > 0 ? `基础 ${t.base_chance}% · 谋略 ${t.chance_with_scheme}% · 全力 ${t.focus_chance}%` : `基础 ${t.base_chance}% · 全力 ${t.focus_chance}%`;
    const targetHtml = t.target ? `<div style="color:#4ecdc4;font-size:0.85rem;margin:0.2rem 0;">合作对象: ${t.target}</div>` : '';
    const deadlyIcon = t.deadly ? `<span class="task-deadly-icon">☠ 极难</span>` : '';
    const deadlyCls = t.deadly ? ' task-card-deadly' : '';
    let cdHtml = '';
    if (schemeOnCd) cdHtml += `<div style="color:#e94560;font-size:0.8rem;margin:0.1rem 0;">谋略冷却剩余 ${schemeCd - curRound} 回合</div>`;
    if (focusOnCd) cdHtml += `<div style="color:#e94560;font-size:0.8rem;margin:0.1rem 0;">全力施展冷却剩余 ${focusCd - curRound} 回合</div>`;
    const schemeDisabled = schemeOnCd ? 'disabled' : '';
    const focusDisabled = focusOnCd ? 'disabled' : '';
    return `<div class="task-card${deadlyCls}" id="taskCard${t.id}">
      <div class="task-name">${t.name} ${deadlyIcon}<span style="font-size:0.8rem;color:#888;">[${typeLabel}]</span></div>
      <div class="task-desc">${t.desc}</div>
      ${targetHtml}
      <div class="task-chance">难度 ${t.difficulty} · ${chanceLabel}</div>
      ${cdHtml}
      <div class="task-btns">
        <button id="taskBtn${t.id}_0" onclick="executeTask(${t.id},'normal')">尝试 (${t.base_chance}%)</button>
        <button class="task-btn-scheme" ${schemeDisabled} id="taskBtn${t.id}_1" onclick="executeTask(${t.id},'scheme')">用谋略 (${t.chance_with_scheme}%)</button>
        <button class="task-btn-focus" ${focusDisabled} id="taskBtn${t.id}_2" onclick="executeTask(${t.id},'focus')">全力施展 (${t.focus_chance}%)</button>
      </div>
    </div>`;
  }).join('');
  overlay.classList.add('active');
}

async function executeTask(taskId, mode) {
  document.querySelectorAll('#taskCard'+taskId+' button').forEach(b => b.disabled = true);
  try {
    const r = await fetch('/api/tasks/execute', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({task_id:taskId, mode:mode})});
    const result = await r.json();
    document.getElementById('taskOverlay').classList.remove('active');
    document.getElementById('tickBtn').disabled = false;
    const banner = document.getElementById('taskResultBanner');
    banner.textContent = result.desc;
    banner.className = 'task-result ' + (result.success ? 'task-result-ok' : 'task-result-fail');
    banner.style.display = 'block';
    setTimeout(() => { banner.style.display = 'none'; }, 4000);
    await fetchWorld();
    await fetchEvents();
  } catch(e) { console.error(e); }
}

// 自动托管
let autoTimer = null;
let autoTicked = false;

function toggleAuto() {
  const btn = document.getElementById('autoBtn');
  if (autoTimer) {
    autoTimer = null;
    autoTicked = false;
    btn.textContent = '托管';
    btn.style.background = '#2d6a4f';
  } else {
    btn.textContent = '托管中';
    btn.style.background = '#e94560';
    autoTimer = 1;
    autoTicked = false;
    doAutoTick();
  }
}

async function doAutoTick() {
  if (!autoTimer) return;
  // 按优先级自动处理弹窗：移动 > 事件 > 不进则退 > 任务
  if (document.getElementById('moveOverlay').classList.contains('active')) {
    // 优先移动，其次日夜兼程，最后停留
    const mb = document.querySelector('#moveGrid .move-card:first-child');
    if (mb) { mb.click(); }
    else if (!document.getElementById('moveRushBtn').disabled) { document.getElementById('moveRushBtn').click(); }
    else { document.getElementById('moveStayBtn').click(); }
    setTimeout(doAutoTick, 300);
    return;
  }
  if (document.getElementById('eventOverlay').classList.contains('active')) {
    await autoChooseEvent();
    setTimeout(doAutoTick, 300);
    return;
  }
  if (document.getElementById('decayOverlay').classList.contains('active')) {
    await autoChooseDecay();
    setTimeout(doAutoTick, 300);
    return;
  }
  if (document.getElementById('taskOverlay').classList.contains('active')) {
    await autoExecuteBestTask();
    setTimeout(doAutoTick, 300);
    return;
  }
  if (document.getElementById('gameoverOverlay').classList.contains('active')) { toggleAuto(); return; }
  const tickBtn = document.getElementById('tickBtn');
  if (tickBtn.disabled) { setTimeout(doAutoTick, 500); return; }
  if (autoTicked) { toggleAuto(); return; }
  autoTicked = true;
  await tick();
  setTimeout(doAutoTick, 300);
}

async function autoChooseEvent() {
  try {
    const r = await fetch('/api/events/pending');
    const data = await r.json();
    if (data.events && data.events[0] && data.events[0].candidates && data.events[0].candidates[0]) {
      await decideEvent(data.events[0].event, data.events[0].candidates[0].name);
    }
  } catch(e) { console.error(e); }
}

async function autoChooseDecay() {
  try {
    const r = await fetch('/api/decay/pending');
    const data = await r.json();
    if (data.stats && data.stats.length > 0) {
      const best = data.stats.reduce((a,b) => a.value > b.value ? a : b);
      await executeDecay(best.field);
    }
  } catch(e) { console.error(e); }
}

async function autoExecuteBestTask() {
  try {
    const r = await fetch('/api/tasks/pending');
    const data = await r.json();
    const tasks = data.tasks || [];
    if (tasks.length === 0) return;
    // 合作任务优先；选择成功率最高的模式
    const chosen = tasks.find(t => t.type === 'coop') || tasks[0];
    const rates = [{mode:'normal',v:chosen.base_chance},{mode:'scheme',v:chosen.chance_with_scheme||0},{mode:'focus',v:chosen.focus_chance}];
    rates.sort((a,b) => b.v - a.v);
    await executeTask(chosen.id, rates[0].mode);
  } catch(e) { console.error(e); }
}

// 不进则退
async function checkDecay() {
  try {
    const r = await fetch('/api/decay/pending');
    const data = await r.json();
    if (data && data.stats) { showDecay(data.stats); return true; }
  } catch(e) { console.error(e); }
  return false;
}

function showDecay(stats) {
  document.getElementById('tickBtn').disabled = true;
  const grid = document.getElementById('decayGrid');
  grid.innerHTML = stats.map(s => {
    const newVal = Math.floor(s.value * 0.9);
    return `<div class="decay-card" onclick="executeDecay('${s.field}')">
      <div class="label">${s.label}</div>
      <div class="value">${s.value}</div>
      <div class="note">降低10% → ${newVal}</div>
    </div>`;
  }).join('');
  document.getElementById('decayOverlay').classList.add('active');
}

async function executeDecay(field) {
  try {
    await fetch('/api/decay/execute', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({field})});
    document.getElementById('decayOverlay').classList.remove('active');
    document.getElementById('tickBtn').disabled = false;
    await fetchWorld();
    await fetchEvents();
    await checkPendingTasks();
  } catch(e) { console.error(e); }
}

// 天下第一武道会
async function checkTournament() {
  try {
    const r = await fetch('/api/tournament');
    const t = await r.json();
    if (t && t.active && t.champion) {
      document.getElementById('tournamentBtn').style.display = 'inline-block';
    }
  } catch(e) { console.error(e); }
}

async function showTournament() {
  try {
    const r = await fetch('/api/tournament');
    const t = await r.json();
    if (!t || !t.active) return;
    let html = '';
    for (const g of (t.groups||[])) {
      html += `<div class="tournament-group"><h3>${g.name}组</h3>`;
      html += `<div style="font-size:0.8rem;color:#e94560;">参赛者: ${(g.players||[]).join('、')}</div>`;
      html += `<div style="margin:0.3rem 0;font-size:0.8rem;color:#888;">对战记录:</div>`;
      for (const m of (g.matches||[])) {
        html += `<div class="tournament-match">[${m.round}] ${m.a} vs ${m.b} → ${m.winner}胜</div>`;
      }
      if (g.results) {
        html += `<div class="tournament-standings">出线: 第一名 ${g.results['第一名']} | 第二名 ${g.results['第二名']}</div>`;
      }
      html += `</div>`;
    }
    if (t.knockout && t.knockout.length > 0) {
      html += `<div style="margin-top:1rem;"><h3 style="color:#e040fb;text-align:center;">淘汰赛</h3>`;
      for (const rnd of t.knockout) {
        html += `<div class="tournament-ko"><h3>${rnd.round}</h3>`;
        for (const m of (rnd.matches||[])) {
          html += `<div class="tournament-match">${m.a} vs ${m.b} → ${m.winner}胜</div>`;
        }
        html += `</div>`;
      }
      html += `</div>`;
    }
    if (t.champion) {
      html += `<div class="tournament-champion"><div class="name">🏆 ${t.champion}</div><div style="color:#a0a0c0;margin-top:0.3rem;">天下第一人 · 武力+10 · 众人好感-10</div></div>`;
    }
    document.getElementById('tournamentContent').innerHTML = html;
    document.getElementById('tournamentOverlay').classList.add('active');
  } catch(e) { console.error(e); }
}

function closeTournament() {
  document.getElementById('tournamentOverlay').classList.remove('active');
}

function portraitUrl(id) { return '/api/images/portrait/' + encodeURIComponent('01 ('+(id+1)+').png'); }
function fullBodyUrl(id) { return '/api/images/full-body/' + encodeURIComponent('01 ('+(id+1)+').png'); }

function showFullBody(id) {
  document.getElementById('fullbodyImg').src = fullBodyUrl(id);
  document.getElementById('fullbodyOverlay').classList.add('active');
}

function showCityMap() {
  const data = window._lastData;
  if (!data || !data.cities) return;
  const byRegion = {};
  for (const [city, info] of Object.entries(data.cities)) {
    const r = info.region;
    if (!byRegion[r]) byRegion[r] = [];
    byRegion[r].push(city);
  }
  const ZHONGYUAN_LEFT = ['长安','燕京','洛阳'];
  const ZHONGYUAN_RIGHT = ['应天府','襄阳','开封'];
  const OTHER_REGIONS = ['东海','江南','西域','塞北'];
  const cityHtml = (city, info) => {
    const pop = info.population||[];
    const badges = [];
    if (info.capital) badges.push('帝都');
    if (info.regional_center) badges.push('要冲');
    const badgeHtml = badges.length ? ' <span style="color:#ffd700;font-size:0.7rem;">['+badges.join('+')+']</span>' : '';
    const connHtml = (info.connections||[]).length ? ' → <span class="cconn">' + info.connections.join(', ')+'</span>' : '';
    const popHtml = pop.length ? `<span class="cpop" onclick="showCityPeople('${city}')" style="cursor:pointer;text-decoration:underline dotted;">${pop.length}人</span>` : `<span class="cpop">${pop.length}人</span>`;
    return `<div class="citymap-city"><span class="cname">${city}</span>${badgeHtml}${popHtml}${connHtml}</div>`;
  };
  let html = '<div style="text-align:center;margin-bottom:1rem;"><img src="/api/data/map.png" style="max-width:100%;border-radius:8px;border:1px solid #555;"></div>';
  html += '<div class="citymap-wrapper">';
  html += '<div class="citymap-section"><h3>中原</h3><div class="citymap-zhongyuan-grid">';
  html += '<div class="citymap-zhongyuan-col">';
  for (const city of ZHONGYUAN_LEFT) {
    html += cityHtml(city, data.cities[city]);
  }
  html += '</div>';
  html += '<div class="citymap-zhongyuan-col">';
  for (const city of ZHONGYUAN_RIGHT) {
    html += cityHtml(city, data.cities[city]);
  }
  html += '</div>';
  html += '</div></div>';
  html += '<div class="citymap-grid">';
  for (const r of OTHER_REGIONS) {
    if (!byRegion[r]) continue;
    html += `<div class="citymap-region"><h3>${r}</h3>`;
    for (const city of byRegion[r]) {
      html += cityHtml(city, data.cities[city]);
    }
    html += '</div>';
  }
  html += '</div>';
  html += '</div>';
  document.getElementById('cityMapContent').innerHTML = html;
  document.getElementById('cityMapOverlay').classList.add('active');
}

function showCityPeople(city) {
  const data = window._lastData;
  if (!data || !data.cities || !data.cities[city]) return;
  const info = data.cities[city];
  const pop = info.population || [];
  const allChars = data.characters || [];
  const cityChars = allChars.filter(c => c.city === city);
  document.getElementById('cityPeopleTitle').textContent = `${city} · ${info.region}（${pop.length}人）`;
  let html = '<div style="display:flex;flex-direction:column;gap:0.5rem;">';
  if (cityChars.length === 0) {
    html += '<div style="color:#888;text-align:center;padding:1rem;">暂无人物</div>';
  } else {
    cityChars.forEach(c => {
      const alive = c.alive !== false;
      const nameColor = alive ? '#eee' : '#666';
      const statusText = alive ? '存活' : '已故';
      const statusColor = alive ? '#4caf50' : '#f44336';
      html += `<div style="display:flex;align-items:center;gap:0.6rem;padding:0.4rem 0.5rem;border-bottom:1px solid #1a1a3e;font-size:0.85rem;">
        <img src="${portraitUrl(c.id)}" style="width:36px;height:36px;border-radius:50%;object-fit:cover;">
        <div style="flex:1;">
          <div><span style="color:${nameColor};font-weight:bold;">${c.name}</span> <span style="color:#888;font-size:0.75rem;">${c.gender} · ${c.age}岁</span></div>
          <div style="color:#888;font-size:0.75rem;">机敏${c.l} 武力${c.w} 魅力${c.i} 智谋${c.p}</div>
        </div>
        <span style="color:${statusColor};font-size:0.75rem;">${statusText}</span>
      </div>`;
    });
  }
  html += '</div>';
  document.getElementById('cityPeopleContent').innerHTML = html;
  document.getElementById('cityPeopleOverlay').classList.add('active');
}
