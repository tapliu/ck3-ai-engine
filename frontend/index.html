<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>浪子江湖-侠行四海</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: system-ui, sans-serif; background: #1a1a2e; color: #eee; padding: 2rem; max-width: 1200px; margin: 0 auto; }
h1 { text-align:center; color:#e94560; margin-bottom:1rem; }
.header { display:flex; align-items:center; justify-content:space-between; margin-bottom:1.5rem; flex-wrap:wrap; gap:0.5rem; }
.round { font-size:1.2rem; color:#a0a0c0; background:#16213e; padding:0.4rem 1rem; border-radius:6px; }
.controls { display:flex; gap:0.5rem; }
button { padding:0.5rem 1.5rem; background:#e94560; color:#fff; border:none; border-radius:4px; cursor:pointer; font-size:1rem; }
button:hover { background:#c73650; }
button:disabled { opacity:0.5; cursor:not-allowed; }

/* 玩家横幅 */
.player-banner { background:linear-gradient(135deg,#16213e,#1a1a3e); border:2px solid #e94560; border-radius:12px; padding:1.5rem; margin-bottom:1.5rem; display:grid; grid-template-columns:auto 1fr; gap:1.5rem; align-items:center; box-shadow:0 0 16px rgba(233,69,96,0.2); }
.player-avatar { width:80px; height:80px; border-radius:50%; background:#e94560; display:flex; align-items:center; justify-content:center; font-size:2.5rem; font-weight:bold; color:#fff; }
.player-info h2 { color:#e94560; margin-bottom:0.3rem; }
.player-info .sub { color:#a0a0c0; font-size:0.9rem; }
.player-info .stats { display:flex; gap:1.5rem; margin-top:0.5rem; flex-wrap:wrap; }
.player-info .stats span { font-size:0.9rem; }
.player-info .stats .val { color:#eee; font-weight:bold; }
.player-info .stats .lbl { color:#888; }
.player-info .rels { margin-top:0.5rem; display:flex; gap:0.3rem; flex-wrap:wrap; }
.badge { display:inline-block; background:#0f3460; border-radius:4px; padding:0.15rem 0.5rem; font-size:0.75rem; }

/* 宝物 */
.treasure { display:inline-block; background:#3a1a2e; border:1px solid #e94560; border-radius:4px; padding:0.15rem 0.5rem; font-size:0.75rem; margin-right:0.2rem; margin-bottom:0.2rem; color:#f0a0b0; }

.layout { display:flex; gap:1.5rem; }
.grid { flex:1; display:grid; grid-template-columns:repeat(auto-fill,minmax(290px,1fr)); gap:1rem; }
.card { background:#16213e; border-radius:8px; padding:1rem; border:1px solid #0f3460; }
.card .name { font-size:1.1rem; font-weight:bold; color:#e94560; }
.card .tag { font-size:0.8rem; color:#888; margin-left:0.3rem; }
.card .stats { display:grid; grid-template-columns:1fr 1fr; gap:0.2rem 1rem; margin:0.4rem 0; }
.card .stat { font-size:0.85rem; }
.card .stat span { color:#a0a0c0; }
.card .val { color:#eee; font-weight:bold; }
.card .alive { color:#4caf50; font-weight:bold; }
.card .dead { color:#f44336; font-weight:bold; }
.card .desc { color:#666; font-size:0.8rem; margin:0.3rem 0; }

.sidebar { width:340px; flex-shrink:0; }
.events { background:#16213e; border-radius:8px; padding:1rem; max-height:600px; overflow-y:auto; position:sticky; top:1rem; }
.events h2 { margin-bottom:0.5rem; color:#e94560; font-size:1rem; }
.event-item { padding:0.35rem 0; border-bottom:1px solid #0f3460; font-size:0.85rem; }
.event-round { color:#e94560; font-weight:bold; margin-right:0.4rem; }
.event-treasure { color:#f0a0b0; }
.event-wuxia { color:#80c0e0; }
.event-combat { color:#ff6b35; }
.event-cooperation { color:#4ecdc4; }
.event-task_success { color:#4caf50; }
.event-task_fail { color:#f44336; }
.event-decay { color:#ff9800; }
.event-tournament { color:#e040fb; }
.xia-yi { color:#ffd700; font-size:0.85rem; }
.tournament-group { background:#16213e; border:1px solid #533483; border-radius:8px; padding:0.8rem; margin-bottom:0.8rem; }
.tournament-group h3 { color:#e040fb; font-size:0.95rem; margin-bottom:0.3rem; }
.tournament-match { font-size:0.8rem; padding:0.15rem 0; color:#a0a0c0; }
.tournament-standings { font-size:0.8rem; color:#888; margin-top:0.2rem; }
.tournament-ko { background:#1a1a3e; border:1px solid #e040fb; border-radius:8px; padding:0.8rem; margin-bottom:0.5rem; }
.tournament-ko h3 { color:#e040fb; font-size:0.95rem; }
.tournament-champion { text-align:center; padding:1rem; background:linear-gradient(135deg,#3a1a2e,#533483); border:2px solid #ffd700; border-radius:12px; margin-top:1rem; }
.tournament-champion .name { font-size:1.3rem; color:#ffd700; font-weight:bold; }
.decay-card { background:#16213e; border:2px solid #ff9800; border-radius:8px; padding:1rem; cursor:pointer; text-align:center; transition:all 0.2s; }
.decay-card:hover { border-color:#e94560; transform:translateY(-4px); }
.decay-card .label { font-size:1.1rem; font-weight:bold; color:#ff9800; }
.decay-card .value { font-size:1.5rem; color:#eee; margin:0.3rem 0; }
.decay-card .note { font-size:0.8rem; color:#888; }
.select-img { width:100%; max-height:240px; object-fit:cover; border-radius:6px; margin-bottom:0.5rem; }
.char-portrait { width:80px; height:80px; border-radius:50%; object-fit:cover; border:2px solid #e94560; cursor:pointer; }
.char-portrait-sm { width:50px; height:50px; border-radius:50%; object-fit:cover; border:2px solid #0f3460; cursor:pointer; }
.char-portrait-sm:hover { border-color:#e94560; }
.fullbody-img { max-width:100%; max-height:70vh; display:block; margin:0 auto; border-radius:8px; }

.task-card { background:#16213e; border:2px solid #0f3460; border-radius:8px; padding:1rem; margin-bottom:1rem; }
.task-card .task-name { font-size:1.1rem; font-weight:bold; color:#e94560; }
.task-card .task-desc { font-size:0.85rem; color:#a0a0c0; margin:0.3rem 0; }
.task-card .task-chance { font-size:0.85rem; color:#888; margin:0.3rem 0; }
.task-btns { display:flex; gap:0.5rem; margin-top:0.5rem; }
.task-btns button { flex:1; padding:0.4rem 0; font-size:0.85rem; }
.task-btn-scheme { background:#533483; }
.task-btn-scheme:hover { background:#6b4099; }
.task-btn-focus { background:#2d6a4f; }
.task-btn-focus:hover { background:#40916c; }
.task-result { position:fixed; top:1rem; left:50%; transform:translateX(-50%); padding:0.8rem 1.5rem; border-radius:8px; z-index:200; font-size:0.95rem; text-align:center; display:none; max-width:500px; }
.task-result-ok { background:#1b4332; border:1px solid #4caf50; color:#a5d6a7; }
.task-result-fail { background:#3e1a1a; border:1px solid #f44336; color:#ef9a9a; }

.treasure-detail { max-width:400px; }
.treasure-detail .td-name { font-size:1.3rem; color:#e94560; font-weight:bold; }
.treasure-detail .td-type { font-size:0.85rem; color:#888; margin-bottom:0.5rem; }
.treasure-detail .td-desc { font-size:0.9rem; color:#a0a0c0; margin-bottom:0.8rem; }
.treasure-detail .td-bonus { display:grid; grid-template-columns:1fr 1fr; gap:0.3rem; }
.treasure-detail .td-bonus .tb-item { background:#0f3460; padding:0.3rem 0.6rem; border-radius:4px; font-size:0.85rem; text-align:center; }
.treasure-detail .td-bonus .tb-item .tb-val { font-weight:bold; color:#e94560; }

/* overlay */
.overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); justify-content:center; align-items:center; z-index:100; }
.overlay.active { display:flex; }
.modal { background:#1a1a2e; border:2px solid #e94560; border-radius:12px; padding:2rem; max-width:640px; width:90%; max-height:80vh; overflow-y:auto; }
.modal h2 { color:#e94560; margin-bottom:1rem; text-align:center; }
.modal .intro { text-align:center; margin-bottom:1.5rem; color:#a0a0c0; }
.pick-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:1rem; }
.pick-card { background:#16213e; border:2px solid #0f3460; border-radius:8px; padding:1rem; cursor:pointer; text-align:center; transition:all 0.2s; }
.pick-card:hover { border-color:#e94560; transform:translateY(-4px); }
.pick-card .name { font-size:1.1rem; font-weight:bold; color:#e94560; }
.pick-card .stat { font-size:0.85rem; color:#a0a0c0; margin:0.2rem 0; }
.pick-card .desc { font-size:0.8rem; color:#666; margin-top:0.5rem; }

@media(max-width:768px) { .layout { flex-direction:column; } .sidebar { width:100%; } .pick-grid { grid-template-columns:1fr; } .player-banner { grid-template-columns:1fr; text-align:center; } .player-avatar { margin:0 auto; } }
</style>
</head>
<body>
<h1>浪子江湖 · 侠行四海</h1>
<div class="header">
  <div class="round" id="roundDisplay">回合: 0</div>
  <div class="controls">
    <button id="tickBtn" onclick="tick()" disabled>推进至下一回合</button>
    <button id="autoBtn" onclick="toggleAuto()" style="background:#2d6a4f;">托管</button>
    <button id="tournamentBtn" onclick="showTournament()" style="display:none;background:#533483;">天下第一武道会</button>
    <button onclick="fetchWorld()">刷新</button>
  </div>
</div>

<div id="playerBanner" style="display:none;" class="player-banner"></div>

<div class="layout">
  <div>
    <div style="display:flex;align-items:center;gap:0.5rem;margin-bottom:1rem;flex-wrap:wrap;">
      <span style="color:#888;font-size:0.85rem;">排序:</span>
      <select id="sortSelect" onchange="fetchWorld()" style="background:#16213e;color:#eee;border:1px solid #0f3460;border-radius:4px;padding:0.3rem 0.6rem;font-size:0.85rem;">
        <option value="">默认</option>
        <option value="rel">好感</option>
        <option value="l">机敏</option>
        <option value="w">武力</option>
        <option value="i">魅力</option>
        <option value="p">智谋</option>
        <option value="xia_yi">侠义值</option>
      </select>
    </div>
    <div id="world" class="grid"></div>
  </div>
  <div class="sidebar">
    <div class="events" id="events">
      <h2>江湖日志</h2>
      <div id="eventLog"></div>
    </div>
  </div>
</div>

<!-- 选人弹窗 -->
<div class="overlay active" id="selectOverlay">
  <div class="modal">
    <h2>选择你的角色</h2>
    <div class="intro">闯荡江湖，从选择一位侠士开始</div>
    <div class="pick-grid" id="selectGrid"></div>
  </div>
</div>

<!-- 事件弹窗 -->
<div class="overlay" id="eventOverlay">
  <div class="modal">
    <h2 id="eventTitle">事件</h2>
    <div class="intro" id="eventIntro"></div>
    <div class="pick-grid" id="eventGrid"></div>
  </div>
</div>

<!-- 任务弹窗 -->
<div class="overlay" id="taskOverlay">
  <div class="modal">
    <h2>江湖任务</h2>
    <div class="intro">每回合可执行一个任务</div>
    <div id="taskList"></div>
    <div style="text-align:center;margin-top:1rem;"><button onclick="skipTasks()">跳过任务</button></div>
  </div>
</div>

<div id="taskResultBanner" class="task-result"></div>

<!-- 不进则退弹窗 -->
<div class="overlay" id="decayOverlay">
  <div class="modal" style="max-width:420px;">
    <h2>不进则退</h2>
    <div class="intro">每10回合需选择一项属性降低10%</div>
    <div class="pick-grid" id="decayGrid" style="grid-template-columns:1fr 1fr;"></div>
  </div>
</div>

<!-- 天下第一武道会弹窗 -->
<div class="overlay" id="tournamentOverlay">
  <div class="modal" style="max-width:600px;">
    <h2>🏆 天下第一武道会</h2>
    <div id="tournamentContent"></div>
    <div style="text-align:center;margin-top:1.2rem;"><button onclick="closeTournament()">关闭</button></div>
  </div>
</div>

<!-- 全身像弹窗 -->
<div class="overlay" id="fullbodyOverlay">
  <div class="modal" style="max-width:500px;text-align:center;">
    <img id="fullbodyImg" class="fullbody-img" src="">
    <div style="text-align:center;margin-top:1rem;"><button onclick="document.getElementById('fullbodyOverlay').classList.remove('active')">关闭</button></div>
  </div>
</div>

<!-- 宝物详情弹窗 -->
<div class="overlay" id="treasureOverlay">
  <div class="modal" style="max-width:420px;">
    <div class="treasure-detail" id="treasureDetail"></div>
    <div style="text-align:center;margin-top:1.2rem;"><button onclick="closeTreasure()">关闭</button></div>
  </div>
</div>

<script>
async function fetchWorld() {
  try {
    const r = await fetch('/api/world');
    render(await r.json());
  } catch(e) { console.error(e); }
}

async function tick() {
  const btn = document.getElementById('tickBtn');
  btn.disabled = true;
  try {
    await fetch('/tick', {method:'POST'});
    await fetchWorld();
    await fetchEvents();
    await checkTournament();
    const hasEvent = await checkPendingEvents();
    if (!hasEvent) {
      const hasDecay = await checkDecay();
      if (!hasDecay) await checkPendingTasks();
    }
  } catch(e) { console.error(e); }
  btn.disabled = false;
}

async function fetchEvents() {
  try {
    const r = await fetch('/api/events');
    const data = await r.json();
    const log = document.getElementById('eventLog');
    const TYPE_CLASS = {'treasure':'event-treasure','wuxia':'event-wuxia','combat':'event-combat','cooperation':'event-cooperation','task_success':'event-task_success','task_fail':'event-task_fail','decay':'event-decay','tournament':'event-tournament'};
    log.innerHTML = data.map(e => {
      const cls = TYPE_CLASS[e.type]||'';
      return `<div class="event-item ${cls}"><span class="event-round">[${e.round||'?'}]</span>${e.desc}</div>`;
    }).join('') + log.innerHTML;
  } catch(e) { console.error(e); }
}

function render(data) {
  document.getElementById('roundDisplay').textContent = '回合: ' + (data.round||0);

  // 玩家横幅
  const banner = document.getElementById('playerBanner');
  const p = data.player;
  if (p) {
    banner.style.display = 'grid';
    const STAT_LABELS = {l:'机敏', w:'武力', i:'魅力', p:'智谋'};
    const rels = [];
    if (p.master) rels.push('师:'+p.master);
    if (p.spouse) rels.push('配偶:'+p.spouse);
    (p.sworn_brothers||[]).forEach(b => rels.push('义:'+b));
    banner.innerHTML = `
      <img class="char-portrait" src="${portraitUrl(p.id)}" onclick="showFullBody(${p.id})" title="点击查看全身像">
      <div class="player-info">
        <h2>${p.name}</h2>
        <div class="sub">${p.gender} · ${p.age}岁 · ${p.region} · 评分 ${p.score}</div>
        <div class="sub" style="margin-top:0.2rem;">${p.desc||''}</div>
        <div class="stats">
          ${Object.entries(STAT_LABELS).map(([k,v]) => {
            const b = p['base_'+k], bonus = p['bonus_'+k]||0;
            const display = bonus ? `${b+bonus} (${b}+${bonus})` : b;
            return `<span><span class="lbl">${v}</span> <span class="val">${display}</span></span>`;
          }).join('')}
        </div>
        <div class="xia-yi">侠义值: ${p.xia_yi||0}${p.title ? ' · 称号: '+p.title : ''}</div>
        <div class="rels">${rels.map(r => `<span class="badge">${r}</span>`).join('')}</div>
        <div class="rels" style="margin-top:0.3rem;">${(p.treasures||[]).map(t => `<span class="treasure" data-treasure='${JSON.stringify(t).replace(/'/g,"\\'")}' onclick="showTreasure(this)">${t.name}</span>`).join('')}</div>
      </div>`;
  } else {
    banner.style.display = 'none';
  }

  // NPC网格
  const el = document.getElementById('world');
  const sortBy = document.getElementById('sortSelect').value;
  const STAT_LABELS = {l:'机敏', w:'武力', i:'魅力', p:'智谋'};
  let chars = (data.characters||[]).filter(c => c.name !== (p&&p.name));
  if (sortBy) {
    const desc = sortBy === 'rel' ? (c) => -(c.rel||0) : (c) => -(c[sortBy]||0);
    chars.sort((a,b) => desc(a) - desc(b));
  }
  el.innerHTML = chars.map(c => {
    const rels = [];
    if (c.master) rels.push('师:'+c.master);
    if (c.spouse) rels.push('配偶:'+c.spouse);
    (c.sworn_brothers||[]).forEach(b => rels.push('义:'+b));
    return `
    <div class="card">
      <div style="display:flex;align-items:center;gap:0.5rem;margin-bottom:0.3rem;">
        <img class="char-portrait-sm" src="${portraitUrl(c.id)}" onclick="showFullBody(${c.id})" title="点击查看全身像">
        <div><div class="name">${c.name}<span class="tag">${c.region}</span></div></div>
      </div>
      <div class="desc">${c.desc||''}</div>
      <div class="stats">
        ${Object.entries(STAT_LABELS).map(([k,v]) => {
          const b = c['base_'+k], bonus = c['bonus_'+k]||0;
          const display = bonus ? `${b+bonus} (${b}+${bonus})` : b;
          return `<div class="stat"><span>${v}</span> <span class="val">${display}</span></div>`;
        }).join('')}
        <div class="stat"><span>年龄</span> <span class="val">${c.age}</span></div>
        <div class="stat"><span>评分</span> <span class="val">${c.score}</span></div>
      </div>
      <div style="color:#888;font-size:0.8rem;margin:0.3rem 0;">好感: <span style="color:${(c.rel||0)>=0?'#4caf50':'#f44336'};font-weight:bold;">${(c.rel||0)>=0?'+':''}${c.rel||0}</span></div>
      <div class="xia-yi">侠义值: ${c.xia_yi||0}${c.title ? ' · 称号: '+c.title : ''}</div>
      <div>${rels.map(r => `<span class="badge">${r}</span>`).join('')}</div>
      <div>${(c.treasures||[]).map(t => `<span class="treasure" data-treasure='${JSON.stringify(t).replace(/'/g,"\\'")}' onclick="showTreasure(this)">${t.name}</span>`).join('')}</div>
      <div class="${c.alive?'alive':'dead'}">${c.alive?'存活':'已死亡'}</div>
    </div>`;
  }).join('');
}

// 角色选择
async function loadSelect() {
  try {
    const r = await fetch('/api/start/candidates');
    const data = await r.json();
    const grid = document.getElementById('selectGrid');
    const STAT_LABELS = {l:'机敏', w:'武力', i:'魅力', p:'智谋'};
    grid.innerHTML = data.map(c => `
      <div class="pick-card" onclick="selectChar('${c.name}')">
        <img class="select-img" src="${fullBodyUrl(c.id)}" alt="${c.name}">
        <div class="name">${c.name}</div>
        <div class="stat">${c.gender} · ${c.age}岁 · ${c.region}</div>
        ${Object.entries(STAT_LABELS).map(([k,v]) => `<div class="stat">${v}: ${c[k]}</div>`).join('')}
        <div class="stat">评分: ${c.score}</div>
        <div class="desc">${c.desc||''}</div>
      </div>
    `).join('');
  } catch(e) { console.error(e); }
}

async function selectChar(name) {
  try {
    await fetch('/api/start/select', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({name})});
    document.getElementById('selectOverlay').classList.remove('active');
    document.getElementById('tickBtn').disabled = false;
    await fetchWorld();
  } catch(e) { console.error(e); }
}

// 事件决策
async function checkPendingEvents() {
  try {
    const r = await fetch('/api/events/pending');
    const data = await r.json();
    if (data.events && data.events.length > 0) { showEvent(data.events[0]); return true; }
  } catch(e) { console.error(e); }
  return false;
}

function showEvent(evt) {
  const overlay = document.getElementById('eventOverlay');
  document.getElementById('eventTitle').textContent = evt.label;
  const STAT_LABELS = {l:'机敏', w:'武力', i:'魅力', p:'智谋'};
  const hints = {apprentice:'选择一位师父', marry:'选择一位伴侣', sworn:'选择一位结义之人'};
  document.getElementById('eventIntro').textContent = hints[evt.event]||'';
  const grid = document.getElementById('eventGrid');
  grid.innerHTML = evt.candidates.map(c => {
    const extra = evt.event==='apprentice' ? `${c.age}岁` : evt.event==='marry' ? `${c.gender} · ${c.age}岁` : `${c.age}岁`;
    return `<div class="pick-card" onclick="decideEvent('${evt.event}','${c.name}')">
      <div class="name">${c.name}</div>
      <div class="stat">${extra} · ${c.region}</div>
      ${Object.entries(STAT_LABELS).map(([k,v]) => `<div class="stat">${v}: ${c[k]}</div>`).join('')}
      <div class="desc">${c.desc||''}</div>
    </div>`;
  }).join('');
  overlay.classList.add('active');
}

async function decideEvent(etype, target) {
  try {
    await fetch('/api/events/decide', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({event:etype, target})});
    document.getElementById('eventOverlay').classList.remove('active');
    await fetchWorld();
    await fetchEvents();
    await checkPendingTasks();
  } catch(e) { console.error(e); }
}

// 任务系统
async function checkPendingTasks() {
  try {
    const r = await fetch('/api/tasks/pending');
    const data = await r.json();
    if (data.tasks && data.tasks.length > 0) showTasks(data.tasks);
  } catch(e) { console.error(e); }
}

function showTasks(tasks) {
  const overlay = document.getElementById('taskOverlay');
  document.getElementById('tickBtn').disabled = true;
  const list = document.getElementById('taskList');
  list.innerHTML = tasks.map(t => {
    const TYPE_LABELS = {non_char:'非人物类', char:'人物类', coop:'合作任务'};
    const typeLabel = TYPE_LABELS[t.type]||t.type;
    const chanceLabel = t.scheme_bonus > 0 ? `基础 ${t.base_chance}% · 谋略 ${t.chance_with_scheme}% · 全力 ${t.focus_chance}%` : `基础 ${t.base_chance}% · 全力 ${t.focus_chance}%`;
    const targetHtml = t.target ? `<div style="color:#4ecdc4;font-size:0.85rem;margin:0.2rem 0;">合作对象: ${t.target}</div>` : '';
    return `<div class="task-card" id="taskCard${t.id}">
      <div class="task-name">${t.name} <span style="font-size:0.8rem;color:#888;">[${typeLabel}]</span></div>
      <div class="task-desc">${t.desc}</div>
      ${targetHtml}
      <div class="task-chance">难度 ${t.difficulty} · ${chanceLabel}</div>
      <div class="task-btns">
        <button id="taskBtn${t.id}_0" onclick="executeTask(${t.id},'normal')">尝试 (${t.base_chance}%)</button>
        <button class="task-btn-scheme" id="taskBtn${t.id}_1" onclick="executeTask(${t.id},'scheme')">用谋略 (${t.chance_with_scheme}%)</button>
        <button class="task-btn-focus" id="taskBtn${t.id}_2" onclick="executeTask(${t.id},'focus')">全力施展 (${t.focus_chance}%)</button>
      </div>
    </div>`;
  }).join('');
  overlay.classList.add('active');
}

async function executeTask(taskId, mode) {
  document.querySelectorAll('#taskCard'+taskId+' button').forEach(b => b.disabled = true);
  try {
    const r = await fetch('/api/tasks/execute', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({task_id:taskId, mode:mode})});
    const result = await r.json();
    document.getElementById('taskOverlay').classList.remove('active');
    document.getElementById('tickBtn').disabled = false;
    const banner = document.getElementById('taskResultBanner');
    banner.textContent = result.desc;
    banner.className = 'task-result ' + (result.success ? 'task-result-ok' : 'task-result-fail');
    banner.style.display = 'block';
    setTimeout(() => { banner.style.display = 'none'; }, 4000);
    await fetchWorld();
    await fetchEvents();
  } catch(e) { console.error(e); }
}

function skipTasks() {
  document.getElementById('taskOverlay').classList.remove('active');
  document.getElementById('tickBtn').disabled = false;
}

// 宝物详情
const STAT_KEYS = {l:'机敏', w:'武力', i:'魅力', p:'智谋'};

function showTreasure(el) {
  try {
    const t = JSON.parse(el.dataset.treasure);
    const detail = document.getElementById('treasureDetail');
    const bonuses = Object.entries(STAT_KEYS).filter(([k]) => t[k] > 0).map(([k,v]) => `<div class="tb-item">${v} <span class="tb-val">+${t[k]}</span></div>`).join('');
    detail.innerHTML = `
      <div class="td-name">${t.name}</div>
      <div class="td-type">【${t.type}】</div>
      <div class="td-desc">${t.desc||''}</div>
      ${bonuses ? `<div class="td-bonus">${bonuses}</div>` : '<div style="color:#888;font-size:0.85rem;">无属性加成</div>'}
    `;
    document.getElementById('treasureOverlay').classList.add('active');
  } catch(e) { console.error(e); }
}

function closeTreasure() {
  document.getElementById('treasureOverlay').classList.remove('active');
}

// 自动托管
let autoTimer = null;

function toggleAuto() {
  const btn = document.getElementById('autoBtn');
  if (autoTimer) {
    autoTimer = null;
    btn.textContent = '托管';
    btn.style.background = '#2d6a4f';
  } else {
    btn.textContent = '托管中';
    btn.style.background = '#e94560';
    autoTimer = 1;
    doAutoTick();
  }
}

async function doAutoTick() {
  if (!autoTimer) return;
  // 按优先级自动处理弹窗：事件 > 不进则退 > 任务
  if (document.getElementById('eventOverlay').classList.contains('active')) {
    await autoChooseEvent();
    setTimeout(doAutoTick, 300);
    return;
  }
  if (document.getElementById('decayOverlay').classList.contains('active')) {
    await autoChooseDecay();
    setTimeout(doAutoTick, 300);
    return;
  }
  if (document.getElementById('taskOverlay').classList.contains('active')) {
    await autoExecuteBestTask();
    setTimeout(doAutoTick, 300);
    return;
  }
  const tickBtn = document.getElementById('tickBtn');
  if (tickBtn.disabled) { setTimeout(doAutoTick, 500); return; }
  await tick();
  if (autoTimer) toggleAuto();
}

async function autoChooseEvent() {
  try {
    const r = await fetch('/api/events/pending');
    const data = await r.json();
    if (data.events && data.events[0] && data.events[0].candidates && data.events[0].candidates[0]) {
      await decideEvent(data.events[0].event, data.events[0].candidates[0].name);
    }
  } catch(e) { console.error(e); }
}

async function autoChooseDecay() {
  try {
    const r = await fetch('/api/decay/pending');
    const data = await r.json();
    if (data.stats && data.stats.length > 0) {
      const best = data.stats.reduce((a,b) => a.value > b.value ? a : b);
      await executeDecay(best.field);
    }
  } catch(e) { console.error(e); }
}

async function autoExecuteBestTask() {
  try {
    const r = await fetch('/api/tasks/pending');
    const data = await r.json();
    const tasks = data.tasks || [];
    if (tasks.length === 0) return;
    // 合作任务优先；选择成功率最高的模式
    const chosen = tasks.find(t => t.type === 'coop') || tasks[0];
    const rates = [{mode:'normal',v:chosen.base_chance},{mode:'scheme',v:chosen.chance_with_scheme||0},{mode:'focus',v:chosen.focus_chance}];
    rates.sort((a,b) => b.v - a.v);
    await executeTask(chosen.id, rates[0].mode);
  } catch(e) { console.error(e); }
}

// 不进则退
async function checkDecay() {
  try {
    const r = await fetch('/api/decay/pending');
    const data = await r.json();
    if (data && data.stats) { showDecay(data.stats); return true; }
  } catch(e) { console.error(e); }
  return false;
}

function showDecay(stats) {
  document.getElementById('tickBtn').disabled = true;
  const grid = document.getElementById('decayGrid');
  grid.innerHTML = stats.map(s => {
    const newVal = Math.floor(s.value * 0.9);
    return `<div class="decay-card" onclick="executeDecay('${s.field}')">
      <div class="label">${s.label}</div>
      <div class="value">${s.value}</div>
      <div class="note">降低10% → ${newVal}</div>
    </div>`;
  }).join('');
  document.getElementById('decayOverlay').classList.add('active');
}

async function executeDecay(field) {
  try {
    await fetch('/api/decay/execute', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({field})});
    document.getElementById('decayOverlay').classList.remove('active');
    document.getElementById('tickBtn').disabled = false;
    await fetchWorld();
    await fetchEvents();
    await checkPendingTasks();
  } catch(e) { console.error(e); }
}

// 天下第一武道会
async function checkTournament() {
  try {
    const r = await fetch('/api/tournament');
    const t = await r.json();
    if (t && t.active && t.champion) {
      document.getElementById('tournamentBtn').style.display = 'inline-block';
    }
  } catch(e) { console.error(e); }
}

async function showTournament() {
  try {
    const r = await fetch('/api/tournament');
    const t = await r.json();
    if (!t || !t.active) return;
    let html = '';
    for (const g of (t.groups||[])) {
      html += `<div class="tournament-group"><h3>${g.name}组</h3>`;
      html += `<div style="font-size:0.8rem;color:#e94560;">参赛者: ${(g.players||[]).join('、')}</div>`;
      html += `<div style="margin:0.3rem 0;font-size:0.8rem;color:#888;">对战记录:</div>`;
      for (const m of (g.matches||[])) {
        html += `<div class="tournament-match">${m.a} vs ${m.b} → ${m.winner}胜</div>`;
      }
      html += `<div class="tournament-standings">排名: ${(g.standings||[]).map((s,i) => `第${i+1}名 ${s[0]}(${s[1]}胜${s[2]}负)`).join(' | ')}</div>`;
      html += `</div>`;
    }
    if (t.knockout && t.knockout.length > 0) {
      html += `<div style="margin-top:1rem;"><h3 style="color:#e040fb;text-align:center;">淘汰赛</h3>`;
      for (const rnd of t.knockout) {
        html += `<div class="tournament-ko"><h3>${rnd.round}</h3>`;
        for (const m of (rnd.matches||[])) {
          html += `<div class="tournament-match">${m.a} vs ${m.b} → ${m.winner}胜</div>`;
        }
        html += `</div>`;
      }
      html += `</div>`;
    }
    if (t.champion) {
      html += `<div class="tournament-champion"><div class="name">🏆 ${t.champion}</div><div style="color:#a0a0c0;margin-top:0.3rem;">天下第一人 · 武力+10 · 众人好感-10</div></div>`;
    }
    document.getElementById('tournamentContent').innerHTML = html;
    document.getElementById('tournamentOverlay').classList.add('active');
  } catch(e) { console.error(e); }
}

function closeTournament() {
  document.getElementById('tournamentOverlay').classList.remove('active');
}

function portraitUrl(id) { return '/api/images/portrait/' + encodeURIComponent('01 ('+(id+1)+').png'); }
function fullBodyUrl(id) { return '/api/images/full-body/' + encodeURIComponent('01 ('+(id+1)+').png'); }

function showFullBody(id) {
  document.getElementById('fullbodyImg').src = fullBodyUrl(id);
  document.getElementById('fullbodyOverlay').classList.add('active');
}
